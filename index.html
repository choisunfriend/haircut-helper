<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>결 GYEOL — 스타일 프리뷰</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1B1816; --surface:#242019; --surface-2:#2D2820; --line:#3A332B;
  --accent:#C98A4B; --accent-soft:#E8C39E; --text:#F3ECE2; --text-muted:#9C9183;
  --ok:#8FA888; --warn:#C2685A;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* ── HEADER ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:env(safe-area-inset-top,14px) 20px 12px;
  padding-top:max(env(safe-area-inset-top),14px);
  background:var(--surface);border-bottom:1px solid var(--line);flex-shrink:0;
  min-height:54px;
}
.brand-mark{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--accent-soft);}
.stage-pill{
  font-size:11px;letter-spacing:1px;text-transform:uppercase;
  background:var(--surface-2);border:1px solid var(--line);
  padding:4px 10px;border-radius:20px;color:var(--text-muted);
}
.stage-pill b{color:var(--accent-soft);font-weight:600;}

main{flex:1;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;}
.screen.active{display:flex;}

/* ── BOTTOM NAV ── */
.bottom-nav{
  display:flex;background:var(--surface);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0;
}
.nav-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 4px;cursor:pointer;border:none;background:none;
  color:var(--text-muted);font-size:10px;letter-spacing:0.5px;
  transition:color .15s;
}
.nav-tab .icon{font-size:18px;}
.nav-tab.active{color:var(--accent-soft);}
.nav-tab:disabled{opacity:0.35;cursor:not-allowed;}

/* ── BUTTONS ── */
.btn{
  border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;
  border-radius:12px;padding:13px 20px;font-size:14px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .1s,opacity .15s;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent);color:#1B1816;}
.btn-primary:disabled{background:var(--surface-2);color:var(--text-muted);cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--line);}
.btn-block{width:100%;}

/* ── SCREEN 1: CAPTURE ── */
#screen-capture{background:var(--bg);}
.capture-video-wrap{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:#0a0907;
}
#video{width:100%;height:100%;object-fit:cover;display:block;}
.cam-off-msg{color:var(--text-muted);font-size:13px;text-align:center;padding:0 32px;line-height:1.8;position:absolute;}
#shotPreview{width:100%;height:100%;object-fit:cover;display:none;position:absolute;inset:0;}
.face-guide-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.cap-hint{
  position:absolute;bottom:14px;left:0;right:0;text-align:center;
  font-size:13px;color:var(--accent-soft);
  background:rgba(27,24,22,0.6);padding:6px;
}

/* angle strip */
.angle-strip{
  display:flex;gap:0;background:var(--surface);border-top:1px solid var(--line);
  flex-shrink:0;
}
.angle-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 4px;cursor:pointer;position:relative;border-right:1px solid var(--line);
}
.angle-item:last-child{border-right:none;}
.angle-item.current::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);
}
.angle-thumb{
  width:36px;height:36px;border-radius:6px;
  background:var(--surface-2);overflow:hidden;display:flex;align-items:center;justify-content:center;
}
.angle-thumb img{width:100%;height:100%;object-fit:cover;}
.angle-name{font-size:10px;color:var(--text-muted);letter-spacing:0.5px;}
.angle-check{font-size:11px;color:var(--ok);}

.capture-actions{
  display:flex;gap:10px;padding:12px 16px;
  background:var(--surface);flex-shrink:0;
}
.shutter-btn{
  width:60px;height:60px;border-radius:50%;
  background:var(--accent);border:4px solid rgba(201,138,75,0.3);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:transform .1s;align-self:center;
}
.shutter-btn:active{transform:scale(0.92);}
.cap-right{flex:1;display:flex;flex-direction:column;gap:8px;}
.dial-row{display:flex;align-items:center;gap:10px;}
.dial-mini{position:relative;width:44px;height:44px;flex-shrink:0;}
.dial-mini svg{width:100%;height:100%;}
.dial-mini-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);}
.cap-hint-small{font-size:12px;color:var(--accent-soft);flex:1;}
.cap-btns{display:flex;gap:8px;}

/* ── SCREEN 2: STYLE ── */
#screen-style{overflow:hidden;}
.style-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 4px;}
.style-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.style-card{
  background:var(--surface);border:1.5px solid var(--line);border-radius:14px;
  padding:12px;cursor:pointer;transition:border-color .15s,transform .1s;
  display:flex;flex-direction:column;gap:7px;
}
.style-card:active{transform:scale(0.98);}
.style-card.selected{border-color:var(--accent);}
.style-card.ai-recommended{border-color:var(--ok);}
.style-icon-box{height:80px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.style-card .name{font-size:13px;font-weight:600;}
.style-card .tags{font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;}
.style-card .ai-rec{font-size:10px;color:var(--ok);display:none;}
.style-card.ai-recommended .ai-rec{display:block;}
.style-footer{display:flex;padding:10px 14px 14px;gap:8px;flex-shrink:0;}

/* ── SCREEN 3: ADJUST ── */
#screen-adjust{overflow:hidden;}
.adjust-preview{
  height:45vh;position:relative;overflow:hidden;flex-shrink:0;
  background:var(--surface);
}
.adjust-preview canvas{width:100%;height:100%;display:block;}
.preview-tag{
  position:absolute;top:10px;left:10px;
  background:rgba(27,24,22,0.75);backdrop-filter:blur(4px);
  padding:4px 10px;border-radius:8px;font-size:11px;color:var(--accent-soft);
}
.seg-status{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:11px;color:var(--text-muted);}

.adjust-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 20px;}
.adjust-controls{display:flex;flex-direction:column;gap:14px;}

.angle-switch{display:flex;gap:5px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:4px;}
.angle-switch button{flex:1;background:transparent;border:none;color:var(--text-muted);padding:7px 0;font-size:11px;border-radius:7px;cursor:pointer;font-family:'JetBrains Mono',monospace;}
.angle-switch button.on{background:var(--accent);color:#1B1816;font-weight:600;}

.ai-card{background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:12px 14px;}
.ai-card-hdr{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--accent-soft);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.ai-card-body{font-size:12px;color:var(--text-muted);line-height:1.7;margin-bottom:8px;}
.ai-tags{display:flex;flex-wrap:wrap;gap:5px;}
.ai-tag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:20px;background:var(--surface-2);border:1px solid var(--line);color:var(--accent-soft);}

.slider-block{display:flex;flex-direction:column;gap:7px;}
.slider-row{display:flex;justify-content:space-between;align-items:baseline;}
.slider-label{font-size:13px;font-weight:600;}
.slider-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent-soft);}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--line);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid var(--bg);}

.voice-box{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:8px;}
.voice-btn{display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 12px;border-radius:9px;background:var(--surface-2);transition:background .15s;}
.voice-btn.listening{background:var(--warn);}
.voice-dot{width:9px;height:9px;border-radius:50%;background:var(--text-muted);flex-shrink:0;}
.voice-btn.listening .voice-dot{background:#fff;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.voice-transcript{font-size:11px;color:var(--text-muted);line-height:1.5;}
.voice-transcript b{color:var(--accent-soft);font-weight:600;}
.voice-hints{font-size:10px;color:var(--text-muted);line-height:1.8;font-family:'JetBrains Mono',monospace;}

/* ── SCREEN 4: COMPARE ── */
#screen-compare{overflow:hidden;}
.compare-wrap{flex:1;position:relative;overflow:hidden;}
.compare-base{width:100%;height:100%;display:block;}
.compare-clip{position:absolute;top:0;bottom:0;left:0;overflow:hidden;width:50%;}
.compare-clip canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
.compare-divider{position:absolute;top:0;bottom:0;width:3px;background:var(--accent);left:50%;transform:translateX(-50%);cursor:ew-resize;touch-action:none;}
.compare-divider::after{content:'◂▸';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--accent);color:#1B1816;font-size:10px;padding:5px 6px;border-radius:20px;letter-spacing:2px;}
.compare-label{position:absolute;top:10px;font-size:10px;letter-spacing:1px;padding:4px 9px;background:rgba(27,24,22,0.7);border-radius:7px;color:var(--text-muted);}
.compare-label.before{left:10px;}
.compare-label.after{right:10px;color:var(--accent-soft);}
.compare-bottom{padding:10px 14px 14px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;}

/* ── OVERLAYS ── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface-2);border:1px solid var(--line);
  padding:10px 18px;border-radius:12px;font-size:13px;
  opacity:0;pointer-events:none;transition:all .25s;z-index:50;
  white-space:nowrap;max-width:90vw;white-space:normal;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.ai-overlay{
  position:fixed;inset:0;background:rgba(27,24,22,0.92);z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  backdrop-filter:blur(6px);
}
.ai-overlay.hidden{display:none;}
.ai-spinner{width:40px;height:40px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ai-overlay-text{font-size:14px;color:var(--accent-soft);}
.ai-overlay-sub{font-size:12px;color:var(--text-muted);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px;}

/* ── SECTION TABS ── */
.section-tab{
  background:var(--surface);border:1.5px solid var(--line);border-radius:12px;
  overflow:hidden;transition:border-color .15s;
}
.section-tab.active{border-color:var(--accent);}
.section-tab-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;cursor:pointer;
}
.section-tab-left{display:flex;align-items:center;gap:10px;}
.section-badge{
  font-size:9px;letter-spacing:1px;font-family:'JetBrains Mono',monospace;
  padding:3px 7px;border-radius:6px;
  background:var(--surface-2);color:var(--text-muted);border:1px solid var(--line);
}
.section-tab.active .section-badge{background:var(--accent);color:#1B1816;border-color:var(--accent);}
.section-tab-name{font-size:13px;font-weight:600;color:var(--text);}
.section-tab-desc{font-size:10px;color:var(--text-muted);}
.section-tab-summary{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--accent-soft);}
.section-tab-body{
  padding:0 14px 14px;display:none;flex-direction:column;gap:12px;
  border-top:1px solid var(--line);padding-top:12px;
}
.section-tab.active .section-tab-body{display:flex;}
.param-label-row{display:flex;justify-content:space-between;align-items:baseline;}
.param-label{font-size:12px;color:var(--text-muted);}
.param-val{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--accent-soft);}
.section-affects{font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;margin-top:2px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand-mark">결</div>
    <div class="stage-pill" id="stageLabel">단계 <b>1/4 · 촬영</b></div>
  </header>
  <main>

    <!-- ══ SCREEN 1: CAPTURE ══ -->
    <section class="screen active" id="screen-capture">
      <div class="capture-video-wrap">
        <div class="cam-off-msg" id="camOffMsg">카메라를 불러오는 중…<br><span style="font-size:11px;">아래 업로드 버튼도 이용 가능해요</span></div>
        <video id="video" autoplay playsinline muted></video>
        <img id="shotPreview">
        <svg class="face-guide-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
          <ellipse cx="50" cy="38" rx="34" ry="46" fill="none" stroke="rgba(232,195,158,0.55)" stroke-width="0.7" stroke-dasharray="3 3"/>
        </svg>
        <div class="cap-hint" id="captureHint">정면을 가이드 안에 맞춰주세요</div>
      </div>

      <!-- angle strip -->
      <div class="angle-strip" id="angleStrip">
        <div class="angle-item current" id="card-front" onclick="jumpToAngle(0)">
          <div class="angle-thumb" id="thumb-front"></div>
          <div class="angle-name">정면</div>
          <div class="angle-check" id="chk-front"></div>
        </div>
        <div class="angle-item" id="card-left" onclick="jumpToAngle(1)">
          <div class="angle-thumb" id="thumb-left"></div>
          <div class="angle-name">좌측</div>
          <div class="angle-check" id="chk-left"></div>
        </div>
        <div class="angle-item" id="card-right" onclick="jumpToAngle(2)">
          <div class="angle-thumb" id="thumb-right"></div>
          <div class="angle-name">우측</div>
          <div class="angle-check" id="chk-right"></div>
        </div>
        <div class="angle-item" id="card-back" onclick="jumpToAngle(3)">
          <div class="angle-thumb" id="thumb-back"></div>
          <div class="angle-name">후면</div>
          <div class="angle-check" id="chk-back"></div>
        </div>
      </div>

      <div class="capture-actions">
        <button class="shutter-btn" onclick="captureCurrentAngle()">📷</button>
        <div class="cap-right">
          <div class="dial-row">
            <div class="dial-mini">
              <svg viewBox="0 0 100 100">
                <circle class="seg" id="seg0" cx="50" cy="50" r="42" fill="none" stroke="#3A332B" stroke-width="6" stroke-dasharray="65 197" transform="rotate(-90 50 50)"/>
                <circle class="seg" id="seg1" cx="50" cy="50" r="42" fill="none" stroke="#3A332B" stroke-width="6" stroke-dasharray="65 197" stroke-dashoffset="-65" transform="rotate(-90 50 50)"/>
                <circle class="seg" id="seg2" cx="50" cy="50" r="42" fill="none" stroke="#3A332B" stroke-width="6" stroke-dasharray="65 197" stroke-dashoffset="-130" transform="rotate(-90 50 50)"/>
                <circle class="seg" id="seg3" cx="50" cy="50" r="42" fill="none" stroke="#3A332B" stroke-width="6" stroke-dasharray="65 197" stroke-dashoffset="-195" transform="rotate(-90 50 50)"/>
              </svg>
              <div class="dial-mini-center" id="dialCenter">0/4</div>
            </div>
            <div class="cap-hint-small" id="capHintSmall">촬영 버튼을 눌러주세요</div>
          </div>
          <div class="cap-btns">
            <button class="btn btn-ghost" style="flex:1;font-size:12px;padding:9px 8px;" onclick="retakeCurrent()">재촬영</button>
            <button class="btn btn-ghost" style="flex:1;font-size:12px;padding:9px 8px;" onclick="document.getElementById('fileInput').click()">업로드</button>
            <button class="btn btn-primary" id="toStyleBtn" style="flex:1;font-size:12px;padding:9px 8px;" onclick="navTo('style')" disabled>다음→</button>
          </div>
        </div>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileUpload(event)">
    </section>

    <!-- ══ SCREEN 2: STYLE ══ -->
    <section class="screen" id="screen-style">
      <div class="style-scroll">
        <div class="style-grid" id="styleGrid"></div>
      </div>
      <div class="style-footer">
        <button class="btn btn-ghost" style="flex:1;" onclick="navTo('capture')">← 촬영</button>
        <button class="btn btn-primary" id="toAdjustBtn" style="flex:2;" onclick="navTo('adjust')" disabled>조정하기 →</button>
      </div>
    </section>

    <!-- ══ SCREEN 3: ADJUST ══ -->
    <section class="screen" id="screen-adjust">
      <div class="adjust-preview">
        <canvas id="adjustCanvas"></canvas>
        <div class="preview-tag" id="adjustStyleTag">스타일 미선택</div>
        <div class="seg-status" id="segStatus"></div>
      </div>
      <div class="adjust-scroll">
        <div class="adjust-controls">

          <!-- 뷰 전환 (정면/좌/우/후) -->
          <div class="angle-switch" id="angleSwitch"></div>

          <!-- AI 분석 카드 -->
          <div class="ai-card" id="aiAnalysisCard" style="display:none;">
            <div class="ai-card-hdr"><div class="ai-dot"></div>AI 분석</div>
            <div class="ai-card-body" id="aiAnalysisText"></div>
            <div class="ai-tags" id="aiAnalysisTags"></div>
          </div>

          <!-- 섹션 탭 (미용사 커트 순서) -->
          <div id="sectionTabs" style="display:flex;flex-direction:column;gap:10px;"></div>

          <!-- 컬/웨이브: 전체 공통 -->
          <div class="slider-block" style="border-top:1px solid var(--line);padding-top:12px;">
            <div class="slider-row">
              <span class="slider-label" style="color:var(--text-muted);font-size:12px;">컬 / 웨이브 (전체)</span>
              <span class="slider-val" id="val-globalCurl">30</span>
            </div>
            <input type="range" id="slider-globalCurl" min="0" max="100" value="30"
              oninput="onGlobalCurl(this.value)">
          </div>

          <div class="voice-box">
            <div class="voice-btn" id="voiceBtn" onclick="toggleVoice()">
              <div class="voice-dot"></div>
              <span id="voiceBtnLabel" style="font-size:13px;font-weight:600;">음성으로 조정하기</span>
            </div>
            <div class="voice-transcript" id="voiceTranscript">예: "크라운 길게", "네이프 짧게", "볼륨 추가"</div>
            <div class="voice-hints">크라운·프론트·템플·사이드·후두부·네이프 + 길게·짧게·볼륨·컬</div>
          </div>

          <button class="btn btn-ghost" style="font-size:12px;padding:10px;" onclick="resetSections()">초기화</button>
          <div style="height:4px;"></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;padding:10px 14px 14px;flex-shrink:0;">
        <button class="btn btn-ghost" style="flex:1;font-size:13px;" onclick="navTo('style')">← 스타일</button>
        <button class="btn btn-primary" style="flex:2;font-size:13px;" onclick="navTo('compare')">비교 보기 →</button>
      </div>
    </section>

    <!-- ══ SCREEN 4: COMPARE ══ -->
    <section class="screen" id="screen-compare">
      <div class="compare-wrap" id="comparePane">
        <canvas id="compareBaseCanvas" class="compare-base"></canvas>
        <div class="compare-clip" id="compareClip">
          <canvas id="compareTopCanvas"></canvas>
        </div>
        <div class="compare-divider" id="compareDivider"></div>
        <div class="compare-label before">BEFORE</div>
        <div class="compare-label after">AFTER</div>
      </div>
      <div class="compare-bottom">

let faceLandmarker = null;
let faceLandmarkerReady = false;

async function initFaceLandmarker(){
  try{
    const FL = window.FaceLandmarker;
    const FR = window.FilesetResolver;
    if(!FL || !FR){ console.warn('FaceLandmarker API 없음'); return; }
    const fs = await FR.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm'
    );
    faceLandmarker = await FL.createFromOptions(fs, {
      baseOptions:{
        modelAssetPath:'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate:'GPU'
      },
      runningMode:'IMAGE', numFaces:1,
    });
    faceLandmarkerReady = true;
    console.log('Face Landmarker 준비 완료');
  } catch(e){ console.warn('Face Landmarker 로드 실패:', e); }
}
initFaceLandmarker();

async function detectFaceLandmarks(angle){
  if(!faceLandmarkerReady || !faceLandmarker) return null;
  const dataUrl = state.shots[angle]; if(!dataUrl) return null;
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{
      try{
        const result = faceLandmarker.detect(img);
        if(!result||!result.faceLandmarks||!result.faceLandmarks.length){ resolve(null); return; }
        const lm = result.faceLandmarks[0];
        const nose     = lm[1];
        const lEar     = lm[234];
        const rEar     = lm[454];
        const lEye     = lm[33];
        const rEye     = lm[263];
        const chin     = lm[152];
        const forehead = lm[10];
        const earCX    = (lEar.x + rEar.x) / 2;
        const earSpan  = Math.abs(rEar.x - lEar.x);
        const yaw      = earSpan > 0.01 ? (nose.x - earCX) / (earSpan * 0.5) : 0;
        const eyeY     = (lEye.y + rEye.y) / 2;
        const earY     = (lEar.y + rEar.y) / 2;
        const info = { yaw, foreheadY:forehead.y, eyeY, earY, chinY:chin.y,
                       lEarX:lEar.x, rEarX:rEar.x };
        state.landmarks = state.landmarks || {};
        state.landmarks[angle] = info;
        resolve(info);
      } catch(e){ console.warn('랜드마크 추출 실패:', e); resolve(null); }
    };
    img.onerror = ()=>resolve(null);
    img.src = dataUrl;
  });
}

function refineSectionBoundaries(angle){
  const lm = state.landmarks && state.landmarks[angle]; if(!lm) return;
  SECTIONS.crown.yRange     = [0,                    lm.foreheadY * 0.95];
  SECTIONS.front.yRange     = [lm.foreheadY * 0.85,  lm.eyeY * 1.05];
  SECTIONS.temple.yRange    = [lm.eyeY * 0.9,        lm.earY * 1.05];
  SECTIONS.side.yRange      = [lm.earY * 0.85,       lm.earY * 1.40];
  SECTIONS.occipital.yRange = [lm.earY * 1.15,       lm.chinY * 0.85];
  SECTIONS.nape.yRange      = [lm.chinY * 0.80,      1.0];
  const lx = Math.min(lm.lEarX, lm.rEarX);
  const rx = Math.max(lm.lEarX, lm.rEarX);
  SECTIONS.crown.xRange  = [lx * 0.3,  rx + (1-rx)*0.7];
  SECTIONS.front.xRange  = [lx * 0.55, rx + (1-rx)*0.45];
  console.log('[' + angle + '] yaw=' + lm.yaw.toFixed(2) + ' 섹션 경계 보정됨');
}

/* ════════════════════════════════════════
   HAIR SEGMENTATION
   1차: MediaPipe ImageSegmenter (hair_segmentation 모델)

════════════════════════════════════════ */
let segmenterReady = false;
let segmenterError = false;
let mpImageSegmenter = null; // MediaPipe Tasks Vision segmenter

async function initSegmenter(){
  // ── 1차: MediaPipe Tasks Vision (hair segmentation) ──

    const vision = await window.FilesetResolver.forVisionTasks(

    );

    });

    return;
  } catch(e){
    console.warn('MediaPipe Hair Segmenter 실패, TF.js 폴백:', e);
  }

  // ── 2차 폴백: TF.js SelfieSegmentation ──
  try{
    await tf.ready();
    await tf.setBackend('webgl');

initSegmenter();

/* ────────────────────────────────────────
   헤어 마스크 추출
   - MediaPipe hair_segmenter: category mask에서 hair(=1) 픽셀 추출
   - TF.js fallback: 사람 마스크 + HSV 색상 필터로 hair 근사
──────────────────────────────────────── */
async function extractHairMask(angle){
  const dataUrl = state.shots[angle];
  if(!dataUrl || !segmenter) return false;

  return new Promise(resolve=>{
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = async()=>{
      try{
        const maxDim = 512;
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);

        const srcC = document.createElement('canvas');
        srcC.width=w; srcC.height=h;
        const srcCtx = srcC.getContext('2d');
        srcCtx.drawImage(img, 0, 0, w, h);
        const srcPixels = srcCtx.getImageData(0,0,w,h).data;

        // 마스크 버퍼 (0=background, 255=hair) — 축소 해상도에서 작업
        let hairMaskBuf = new Uint8Array(w * h);

        if(mpImageSegmenter){
          // ── MediaPipe hair_segmenter path ──
          const result = mpImageSegmenter.segment(srcC);
          const catMask = result.categoryMask;
          const maskArr = catMask.getAsUint8Array();
          for(let i=0;i<maskArr.length;i++){
            hairMaskBuf[i] = maskArr[i] === 1 ? 255 : 0;
          }
          catMask.close();
        } else {
          // ── TF.js SelfieSegmentation 폴백 ──
          const segs = await segmenter.segmentPeople(srcC, {
            multiSegmentation: false,
            segmentBodyParts: false,
          });
          // TF.js 사람 마스크 + HSV hair 색상 필터 (마스크 실패시 상단 영역 HSV만 사용)
          let personMaskData = null;
          if(segs && segs.length>0){
            try{
              const binaryMask = await bodySegmentation.toBinaryMask(
                segs,
                {r:255,g:255,b:255,a:255},
                {r:0,g:0,b:0,a:0},
                false, 0.5
              );
              personMaskData = binaryMask.data;
            } catch(e){ personMaskData = null; }
          }

          // 사람 마스크가 있으면 마스크 내에서, 없으면 상단 60% 전체에서 HSV 필터
          const topLimit = Math.round(h * 0.60);
          for(let i=0;i<w*h;i++){
            const iy = Math.floor(i/w);
            const inRegion = personMaskData
              ? personMaskData[i*4+3] > 128
              : iy < topLimit;
            if(inRegion){
              const r=srcPixels[i*4], g=srcPixels[i*4+1], b=srcPixels[i*4+2];
              if(isHairColor(r,g,b)) hairMaskBuf[i]=255;
            }
          }

          // ── 얼굴 중심 제거: Y 22~62% 범위의 가로 25~75% 구간 ──
          // (안경·눈썹·수염 등 얼굴 중앙 어두운 픽셀 제거; 상단 22%는 머리카락 영역이므로 보존)
          for(let y=Math.round(h*0.22); y<Math.round(h*0.70); y++){
            for(let x=Math.round(w*0.25); x<Math.round(w*0.75); x++){
              hairMaskBuf[y*w+x]=0;
            }
          }
          // 목·어깨 제거 (하단 30%)
          for(let y=Math.round(h*0.70); y<h; y++){
            for(let x=0;x<w;x++) hairMaskBuf[y*w+x]=0;
          }
        }

        // ── erosion 제거: sparse한 회색/새치 픽셀 보존 ──
        const pixelCount = hairMaskBuf.filter(v=>v>0).length;
        state._diagLog = `세그멘터:${state.segmenterType||'?'} | 마스크픽셀:${pixelCount}px`;

        // ── 축소 해상도에서 두피 라인(scalpY) 추출 ──
        // (blur 없는 clean mask에서 column별 최상단 픽셀)
        const scalpY_small   = new Float32Array(w).fill(-1);
        const hairEndY_small = new Float32Array(w).fill(-1);
        for(let x=0;x<w;x++){
          for(let y=0;y<h;y++){
            if(hairMaskBuf[y*w+x] > 0){
              if(scalpY_small[x]<0) scalpY_small[x]=y;
              hairEndY_small[x]=y;
            }
          }
        }

        // ── hairEndY_small: 양끝 -1 열을 인접 유효값으로 보간 채우기 ──
        // (forward pass)
        let lastValidEnd = -1;
        for(let x=0;x<w;x++){
          if(hairEndY_small[x]>=0) lastValidEnd=hairEndY_small[x];
          else if(lastValidEnd>=0) hairEndY_small[x]=lastValidEnd; // 아직 유효값 없으면 그대로 -1
        }
        // (backward pass — 앞쪽 -1 채우기)
        let firstValidEnd = -1;
        for(let x=w-1;x>=0;x--){
          if(hairEndY_small[x]>=0) firstValidEnd=hairEndY_small[x];
          else if(firstValidEnd>=0) hairEndY_small[x]=firstValidEnd;
        }
        // scalpY_small도 동일하게
        let lastValidScalp = -1;
        for(let x=0;x<w;x++){
          if(scalpY_small[x]>=0) lastValidScalp=scalpY_small[x];
          else if(lastValidScalp>=0) scalpY_small[x]=lastValidScalp;
        }
        let firstValidScalp = -1;
        for(let x=w-1;x>=0;x--){
          if(scalpY_small[x]>=0) firstValidScalp=scalpY_small[x];
          else if(firstValidScalp>=0) scalpY_small[x]=firstValidScalp;
        }

        // 원본 해상도로 스케일업 (선형 보간)
        const invScale = 1/scale;
        const scalpY   = new Float32Array(img.width).fill(-1);
        const hairEndY = new Float32Array(img.width).fill(-1);
        for(let X=0;X<img.width;X++){
          const xSmall = Math.min(w-1, Math.round(X*scale));
          if(scalpY_small[xSmall]>=0){
            scalpY[X]   = scalpY_small[xSmall]   * invScale;
            hairEndY[X] = hairEndY_small[xSmall]  * invScale;
          }
        }

        // ── 풀 해상도 마스크 캔버스 ──
        const maskC = document.createElement('canvas');
        maskC.width=w; maskC.height=h;
        const mCtx = maskC.getContext('2d');
        const mImg = mCtx.createImageData(w,h);
        for(let i=0;i<w*h;i++){
          mImg.data[i*4]=mImg.data[i*4+1]=mImg.data[i*4+2]=255;
          mImg.data[i*4+3]=hairMaskBuf[i];
        }
        mCtx.putImageData(mImg,0,0);

        const fullMaskC = document.createElement('canvas');
        fullMaskC.width=img.width; fullMaskC.height=img.height;
        fullMaskC.getContext('2d').drawImage(maskC,0,0,img.width,img.height);

        // ── hairCanvas: 원본에서 hair 마스크 영역만 ──
        const hairC = document.createElement('canvas');
        hairC.width=img.width; hairC.height=img.height;
        const hCtx = hairC.getContext('2d');
        hCtx.drawImage(img,0,0);
        hCtx.save();
        hCtx.globalCompositeOperation='destination-in';
        hCtx.drawImage(fullMaskC,0,0);
        hCtx.restore();

        // ── baseCanvas: 원본에서 hair 영역 제거 ──
        const baseC = document.createElement('canvas');
        baseC.width=img.width; baseC.height=img.height;
        const bCtx = baseC.getContext('2d');
        bCtx.drawImage(img,0,0);
        bCtx.save();
        bCtx.globalCompositeOperation='destination-out';
        bCtx.drawImage(fullMaskC,0,0);
        bCtx.restore();

        // ── 헤어 색상 샘플링 ──
        const hairPixelData = hCtx.getImageData(0,0,img.width,img.height).data;
        let rSum=0,gSum=0,bSum=0,cnt=0;
        for(let i=0;i<img.width*img.height;i++){
          if(hairPixelData[i*4+3]>128){
            rSum+=hairPixelData[i*4]; gSum+=hairPixelData[i*4+1]; bSum+=hairPixelData[i*4+2]; cnt++;
          }
        }
        const avgHairColor = cnt>0
          ? `rgb(${Math.round(rSum/cnt)},${Math.round(gSum/cnt)},${Math.round(bSum/cnt)})`
          : '#2A1B12';

        state.hairCanvases[angle] = hairC;
        state.baseCanvases[angle] = baseC;
        state.hairMasks[angle]    = { scalpY, hairEndY, w:img.width, h:img.height, avgColor:avgHairColor };
        resolve(true);
      }catch(e){
        console.warn('extractHairMask 실패:', angle, e);
        resolve(false);
      }
    };
    img.src = dataUrl;
  });
}

/* ────────────────────────────────────────
   유틸: HSV hair 색상 판별 (어두운 갈색~흑색 계열)
──────────────────────────────────────── */
function isHairColor(r,g,b){
  // 흑발·갈색·금발·회색·백발(새치) 모두 인식
  const maxC=Math.max(r,g,b), minC=Math.min(r,g,b);
  const v=maxC/255;
  const s=maxC>0?(maxC-minC)/maxC:0;

  // 1) 흑발·어두운 색
  if(v<0.55) return true;

  // 2) 채도 있는 갈색/적갈색/금발 (hue 0~50 또는 300~360)
  if(s>0.15 && v<0.80){
    const hRaw=maxC>0?( maxC===r?((g-b)/(maxC-minC+0.001))%6
                      : maxC===g?((b-r)/(maxC-minC+0.001))+2
                      :           ((r-g)/(maxC-minC+0.001))+4 )*60 : 0;
    const hh=(hRaw+360)%360;
    if(hh<50||hh>300) return true;
  }

  // 3) 회색·새치·백발: 저채도이면서 밝기 0.55~0.90 구간
  //    (순수 흰색 v>0.90 및 밝은 피부색 제외)
  if(s<0.18 && v>=0.55 && v<0.90) return true;

  return false;
}

/* ────────────────────────────────────────
   유틸: 단순 erosion (노이즈 제거)
──────────────────────────────────────── */
function erodeOnce(buf, w, h){
  const out = new Uint8Array(w*h);
  for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
    const i=y*w+x;
    if(buf[i]>0 && buf[i-1]>0 && buf[i+1]>0 && buf[(y-1)*w+x]>0 && buf[(y+1)*w+x]>0)
      out[i]=255;
  }
  return out;
}

async function navTo(name){
  // unlock tabs as user progresses
  const unlock = (id)=>{ const t=document.getElementById('nav-'+id); if(t) t.disabled=false; };

  if(name==='style'){
    unlock('style');
    if(!aiAnalysis){
      // segmenter가 아직 로딩 중이면 잠깐 대기 (최대 6초)
      if(!segmenterReady && !segmenterError){
        showAI('모델 로딩 중…', 'Hair Segmentation 준비 중');
        let waited = 0;
        while(!segmenterReady && !segmenterError && waited < 6000){
          await new Promise(r=>setTimeout(r,300)); waited+=300;
        }
      }
      if(segmenter){
        const validAngles = ANGLES.filter(a=>state.shots[a]);
        let done = 0;
        for(const a of validAngles){
          showAI(
            `머리카락 추출 중… ${done+1}/${validAngles.length}`,
            `${ANGLE_LABELS[a]} 처리 중`
          );
          await extractHairMask(a);
          // Face Landmarker: 랜드마크 감지 + 섹션 경계 보정
          if(faceLandmarkerReady){
            showAI(`얼굴 분석 중… ${done+1}/${validAngles.length}`, `${ANGLE_LABELS[a]} 랜드마크 감지`);
            await detectFaceLandmarks(a);
            refineSectionBoundaries(a);
          }
          done++;
        }
        hideAI();
      }
      await analyzeWithClaude();
    }
  }
  if(name==='capture'){ stopVoice(); }

  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  const tab = document.getElementById('nav-'+name);
  if(tab) tab.classList.add('active');
  document.getElementById('stageLabel').innerHTML='단계 <b>'+STAGE_NAMES[name]+'</b>';
  currentScreen = name; // 먼저 업데이트

  // currentScreen 업데이트 후 렌더 (블랭크 수정)
  if(name==='adjust'){
    unlock('adjust'); renderAngleSwitch('angleSwitch');
    const angle = state.currentViewAngle;
    const el = document.getElementById('segStatus');
    if(el){
      if(state.hairMasks[angle] && state.hairMasks[angle].scalpY){
        const validCols = Array.from(state.hairMasks[angle].scalpY).filter(y=>y>=0).length;
        const lm = state.landmarks && state.landmarks[angle];
        const yawStr = lm ? ` | yaw:${lm.yaw.toFixed(2)}` : '';
        el.textContent = `✓ 머리카락 인식됨 (${validCols}px 폭) | ${state._diagLog||''}${yawStr}`;
      } else if(state.hairCanvases[angle]){
        el.textContent = `△ 색상 기반 추출 | ${state._diagLog||''}`;
      } else {
        el.textContent = `가이드 오버레이 모드 | 세그멘터:${state.segmenterType||'로딩중'}`;
      }
    }
    buildSectionTabs();
    // globalCurl 슬라이더 동기화
    const gcSlider = document.getElementById('slider-globalCurl');
    const gcVal = document.getElementById('val-globalCurl');
    if(gcSlider) gcSlider.value = state._globalCurl;
    if(gcVal) gcVal.textContent = state._globalCurl;
    setTimeout(()=>drawAdjustPreview(),80);
  }
  if(name==='compare'){ unlock('compare'); renderAngleSwitch('angleSwitchCompare'); setTimeout(()=>drawCompare(),80); }
}

function styleIconSVG(st){
  let s=''; const n=14;
  for(let i=0;i<n;i++){
    const t=i/(n-1), x=20+t*60;
    const amp=(st.curl/100)*14, len=16+(st.length/100)*50;
    const mx=x+Math.sin(t*6)*amp, ex=x+Math.sin(t*6+1)*amp*1.3;
    s+=`<path d="M ${x} 16 Q ${mx} ${16+len*0.5} ${ex} ${16+len}" stroke="${st.colorHex}" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>`;
  }
  return `<svg viewBox="0 0 100 90" width="100%" height="100%"><circle cx="50" cy="12" r="9" fill="#3A332B"/>${s}</svg>`;
}

    state.sections.occipital.length = Math.round(

/* ════════════════════════════════════════
   RENDER / CANVAS
   - 이미지 캐시로 매번 new Image() 방지
   - hairCanvas 없으면 SVG 선 오버레이로 폴백
════════════════════════════════════════ */
const imgCache = {}; // angle → HTMLImageElement (loaded)

function getCachedImg(angle, cb){
  const url = state.shots[angle];
  if(!url){ cb(null); return; }
  if(imgCache[angle] && imgCache[angle].src.endsWith(url.slice(-20))){
    cb(imgCache[angle]); return;
  }
  const img = new Image();
  img.onload = ()=>{ imgCache[angle]=img; cb(img); };
  img.onerror = ()=>cb(null);
  img.src = url;
}

function drawImgOnCanvas(ctx, img, w, h){
  const ir=img.width/img.height, cr=w/h;
  let dw,dh,dx,dy;
  if(ir>cr){dh=h;dw=h*ir;dx=(w-dw)/2;dy=0;}
  else{dw=w;dh=w/ir;dx=0;dy=(h-dh)/2;}
  ctx.drawImage(img,dx,dy,dw,dh);
  return {dw,dh,dx,dy};
}

function syncCanvasSize(canvas){
  const rect=canvas.getBoundingClientRect();
  if(rect.width>0&&rect.height>0){canvas.width=rect.width;canvas.height=rect.height;}
}

// SVG 폴백: hairCanvas 없을 때 선으로 헤어 표현
function drawHairSVGFallback(ctx, w, h, fit){
  if(!state.selectedStyle) return;
  const {length,curl,volume,thickness} = state.sliders;
  const {dw,dh,dx,dy} = fit;

  // 머리 중심 추정 (사진 상단 1/3 중앙)
  const headCX = dx + dw/2;
  const headTopY = dy;
  const headR = dw * 0.18; // 얼굴 반경 추정

  const numStrands = Math.round(8 + (volume/100)*16);
  const hairLen = h * (0.12 + (length/100)*0.45);
  const curlAmt = (curl/100)*40;
  const alpha = 0.35 + (thickness/100)*0.45;
  const color = state.selectedStyle.colorHex;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.8;
  ctx.lineCap = 'round';

  for(let i=0;i<numStrands;i++){
    const t = i/(numStrands-1); // 0~1
    const angle_rad = (t - 0.5) * Math.PI * 1.1; // 머리 둘레
    const startX = headCX + Math.sin(angle_rad) * headR;
    const startY = headTopY + headR * 0.6 - Math.cos(angle_rad) * headR * 0.5;

    const sideOffset = (t-0.5)*2; // -1~1
    const endX = startX + sideOffset*curlAmt + Math.sin(t*Math.PI*3)*curlAmt*0.4;
    const endY = startY + hairLen;
    const cp1x = startX + sideOffset*curlAmt*0.3;
    const cp1y = startY + hairLen*0.4;
    const cp2x = endX + Math.sin(t*Math.PI*2)*curlAmt*0.5;
    const cp2y = startY + hairLen*0.75;

    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,endX,endY);
    ctx.stroke();
  }
  ctx.restore();
}

// 핵심 렌더 함수
function renderFrame(canvas, angle){
  syncCanvasSize(canvas);
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  if(w===0||h===0){ setTimeout(()=>renderFrame(canvas,angle),50); return; }

  getCachedImg(angle, (img)=>{
    ctx.clearRect(0,0,w,h);

    const hairC   = state.hairCanvases[angle];
    const baseC   = state.baseCanvases[angle];
    const maskInf = state.hairMasks[angle];

    if(hairC && baseC && maskInf && maskInf.scalpY){
      // ── 세그멘테이션 성공 ──
      // 레이어 순서:
      // [1] baseC (원본에서 머리카락 영역 제거된 베이스) → 얼굴·배경
      // [2] 새 가닥 (scalpY 기반, 마스크 clip 없이 자유롭게 아래로 뻗음)
      // [3] 컬러 오버레이

      const fit = drawImgOnCanvas(ctx, img, w, h);

      // baseC(머리 구멍 뚫린 베이스)를 fit 좌표로 덮어씀 → 원본 머리카락 픽셀 지움
      const baseScaled = document.createElement('canvas');
      baseScaled.width = w; baseScaled.height = h;
      baseScaled.getContext('2d').drawImage(baseC, fit.dx, fit.dy, fit.dw, fit.dh);
      ctx.drawImage(baseScaled, 0, 0);
      // 이 시점: 원본 img 위에 baseC가 머리카락 영역을 덮음
      // → 머리카락 자리는 baseC 투명 구멍 아래 원본 img가 약간 비치는 블렌드 상태
      // 완전히 지우려면 먼저 img를 깔고 baseC source-over 대신 아래처럼 처리:
      // (사실 baseC = img에 destination-out한 것 → 투명 구멍임 → source-over하면 그 부분은 img가 보임)
      // 핵심: 가닥을 그 위에 source-over로 올리면 머리카락 영역 위로 자유롭게 뻗음 ✓

      const {length,curl,volume,thickness} = state.sliders[angle];
      const maskW = maskInf.w, maskH = maskInf.h;
      const scalpY   = maskInf.scalpY;
      const hairEndY = maskInf.hairEndY;

      const validCount = Array.from(scalpY).filter(y=>y>=0).length;

      if(validCount > maskW * 0.05){
        // 가닥 오버레이 — ctx(메인 캔버스)에 직접 그림, clip 없음
        drawHairStrands(ctx, fit, scalpY, hairEndY, maskW, maskH, hairC, {
          length, curl, volume, thickness,
          color: (state.selectedStyle ? state.selectedStyle.colorHex : null) || maskInf.avgColor,
        });

        // 컬러 오버레이
        if(state.selectedStyle){
          ctx.save();
          ctx.globalCompositeOperation='multiply';
          ctx.globalAlpha=0.15;
          ctx.fillStyle=state.selectedStyle.colorHex;
          const minScalpY = Math.min(...Array.from(scalpY).filter(y=>y>=0));
          const maxHairY  = Math.max(...Array.from(hairEndY).filter(y=>y>=0));
          const top    = fit.dy + (minScalpY/maskH)*fit.dh;
          const bottom = fit.dy + (maxHairY/maskH)*fit.dh * (0.6 + (length/100)*1.0);
          ctx.fillRect(fit.dx, top, fit.dw, bottom - top);
          ctx.restore();
        }
      }

    } else if(img){
      // ── 세그멘테이션 없음: 원본만 표시 (SVG 폴백 제거) ──
      drawImgOnCanvas(ctx, img, w, h);
    } else {
      ctx.fillStyle='#211D19'; ctx.fillRect(0,0,w,h);
      ctx.fillStyle='#52483D'; ctx.font='13px Inter'; ctx.textAlign='center';
      ctx.fillText('이 각도의 사진이 없습니다', w/2, h/2);
    }
  });
}

/* ────────────────────────────────────────
   가닥 렌더링
   - hairCanvas(마스크 영역)를 clip path로 사용 → 마스크 밖으로 절대 안 나감
   - 두피 라인(scalpY)에서 출발, 길이·컬·볼륨 슬라이더 반영
   - 미용 "섹션" 개념: 굵은 면 레이어 + 가는 가닥 레이어 혼합
──────────────────────────────────────── */
function drawHairStrands(ctx, fit, scalpY, hairEndY, maskW, maskH, hairCanvas, opts){
  const {length, curl, volume, thickness, color} = opts;

  const hairLenMult = 0.4 + (length/100) * 3.0;
  const curlAmt     = (curl/100) * fit.dw * 0.07;
  const alpha       = 0.45 + (thickness/100) * 0.40;

  const validCols = [];
  for(let x=0; x<maskW; x++){
    if(scalpY[x] >= 0) validCols.push(x);
  }
  if(validCols.length === 0) return;

  // ── 보간: validCols 안에서 hairEndY/scalpY -1인 열을 인접 유효값으로 채움 ──
  const iScalpY   = new Float32Array(maskW).fill(-1);
  const iHairEndY = new Float32Array(maskW).fill(-1);
  for(let x=0;x<maskW;x++){ iScalpY[x]=scalpY[x]; iHairEndY[x]=hairEndY[x]; }
  // forward pass
  let lS=-1, lE=-1;
  for(let x=0;x<maskW;x++){
    if(iScalpY[x]>=0)   lS=iScalpY[x];   else if(lS>=0) iScalpY[x]=lS;
    if(iHairEndY[x]>=0) lE=iHairEndY[x]; else if(lE>=0) iHairEndY[x]=lE;
  }
  // backward pass
  let fS=-1, fE=-1;
  for(let x=maskW-1;x>=0;x--){
    if(iScalpY[x]>=0)   fS=iScalpY[x];   else if(fS>=0) iScalpY[x]=fS;
    if(iHairEndY[x]>=0) fE=iHairEndY[x]; else if(fE>=0) iHairEndY[x]=fE;
  }

  // curl 방향 기준: 마스크 실제 수평 중심
  const maskCX = validCols.reduce((a,b)=>a+b,0) / validCols.length;

  const toCanvasX = (ix) => fit.dx + (ix / maskW) * fit.dw;
  const toCanvasY = (iy) => fit.dy + (iy / maskH) * fit.dh;

  const cw = ctx.canvas.width, ch = ctx.canvas.height;

  const offscreen = document.createElement('canvas');
  offscreen.width = cw; offscreen.height = ch;
  const oCtx = offscreen.getContext('2d');
  oCtx.lineCap  = 'round';
  oCtx.lineJoin = 'round';

  // ── 레이어 1: 굵은 섹션 (40~80개) ──
  const numSections = Math.round(40 + (volume/100) * 20);
  oCtx.globalAlpha = alpha * 0.55;
  oCtx.lineWidth   = 3 + (volume/100) * 3;
  for(let i=0; i<numSections; i++){
    const ix = validCols[Math.floor((i/numSections)*validCols.length)];
    const sy_img = iScalpY[ix]; if(sy_img < 0) continue;
    const ey_img = iHairEndY[ix] >= 0 ? iHairEndY[ix] : sy_img + maskH*0.40;
    const origLen = Math.max(ey_img - sy_img, maskH*0.05);
    const scaledLen = origLen * hairLenMult;
    const sx_c = toCanvasX(ix) + (Math.random()-0.5)*(fit.dw/numSections)*1.5;
    const sy_c = toCanvasY(sy_img);
    const ey_c = sy_c + (scaledLen/maskH)*fit.dh;
    const sideDir = ix < maskCX ? -1 : 1;
    const curlX = sideDir * Math.sin((i/numSections)*Math.PI*2.5) * curlAmt;
    const ex_c = sx_c + curlX;
    oCtx.strokeStyle = tintColor(color, 0.70+Math.random()*0.35);
    oCtx.beginPath(); oCtx.moveTo(sx_c,sy_c);
    oCtx.bezierCurveTo(sx_c+curlX*0.15, sy_c+(ey_c-sy_c)*0.35,
                       ex_c+(Math.random()-0.5)*curlAmt*0.3, sy_c+(ey_c-sy_c)*0.70,
                       ex_c, ey_c);
    oCtx.stroke();
  }

  // ── 레이어 2: 중간 가닥 (200~450개) ──
  const numMid = Math.round(200 + (volume/100) * 250);
  oCtx.globalAlpha = alpha * 0.55;
  oCtx.lineWidth   = 1.5 + (thickness/100) * 1.5;
  for(let i=0; i<numMid; i++){
    const ix = validCols[Math.floor(Math.random()*validCols.length)];
    const sy_img = iScalpY[ix]; if(sy_img < 0) continue;
    const ey_img = iHairEndY[ix] >= 0 ? iHairEndY[ix] : sy_img + maskH*0.38;
    const origLen = Math.max(ey_img - sy_img, maskH*0.05);
    const scaledLen = origLen * hairLenMult * (0.85+Math.random()*0.3);
    const sx_c = toCanvasX(ix) + (Math.random()-0.5)*fit.dw*0.008;
    const sy_c = toCanvasY(sy_img);
    const ey_c = sy_c + (scaledLen/maskH)*fit.dh;
    const sideDir = ix < maskCX ? -1 : 1;
    const curlX = sideDir * Math.sin(i*0.618*Math.PI) * curlAmt * (0.6+Math.random()*0.5);
    const ex_c = sx_c + curlX;
    oCtx.strokeStyle = tintColor(color, 0.72+Math.random()*0.45);
    oCtx.beginPath(); oCtx.moveTo(sx_c,sy_c);
    oCtx.bezierCurveTo(sx_c+curlX*0.2+(Math.random()-0.5)*curlAmt*0.25, sy_c+(ey_c-sy_c)*0.30,
                       ex_c+(Math.random()-0.5)*curlAmt*0.35, sy_c+(ey_c-sy_c)*0.68,
                       ex_c, ey_c);
    oCtx.stroke();
  }

  // ── 레이어 3: 잔 가닥 (200~400개) ──
  const numFine = Math.round(200 + (volume/100) * 200);
  oCtx.globalAlpha = alpha * 0.35;
  oCtx.lineWidth   = 0.4 + (thickness/100) * 0.6;
  for(let i=0; i<numFine; i++){
    const ix = validCols[Math.floor(Math.random()*validCols.length)];
    const sy_img = iScalpY[ix]; if(sy_img < 0) continue;
    const ey_img = iHairEndY[ix] >= 0 ? iHairEndY[ix] : sy_img + maskH*0.35;
    const origLen = Math.max(ey_img - sy_img, maskH*0.05);
    const scaledLen = origLen * hairLenMult * (0.7+Math.random()*0.5);
    const sx_c = toCanvasX(ix) + (Math.random()-0.5)*fit.dw*0.012;
    const sy_c = toCanvasY(sy_img) + (Math.random()-0.5)*fit.dh*0.01;
    const ey_c = sy_c + (scaledLen/maskH)*fit.dh;
    const sideDir = ix < maskCX ? -1 : 1;
    const curlX = sideDir * Math.random() * curlAmt * 0.8;
    const ex_c = sx_c + curlX;
    oCtx.strokeStyle = tintColor(color, 0.65+Math.random()*0.55);
    oCtx.beginPath(); oCtx.moveTo(sx_c,sy_c);
    oCtx.bezierCurveTo(sx_c+(Math.random()-0.5)*curlAmt*0.2, sy_c+(ey_c-sy_c)*0.25,
                       ex_c+(Math.random()-0.5)*curlAmt*0.25, sy_c+(ey_c-sy_c)*0.72,
                       ex_c, ey_c);
    oCtx.stroke();
  }

  // ── hair 마스크 clip: 시작점은 scalpY로 이미 필터됨
  // destination-in 제거 → 가닥이 마스크 경계 밖(아래)으로 자유롭게 뻗을 수 있음
  // (길이 슬라이더가 마스크 clip에 막히지 않도록)
  ctx.save();
  ctx.globalAlpha = 1;
  ctx.drawImage(offscreen, 0, 0);
  ctx.restore();
}
function tintColor(hex, bright){
  // hex 또는 rgb() 문자열을 받아 밝기 조정
  let r=42,g=27,b=18;
  if(hex.startsWith('#')){
    const n=parseInt(hex.slice(1),16);
    r=(n>>16)&255; g=(n>>8)&255; b=n&255;
  } else {
    const m=hex.match(/\d+/g);
    if(m&&m.length>=3){r=+m[0];g=+m[1];b=+m[2];}
  }
  return `rgb(${Math.min(255,Math.round(r*bright))},${Math.min(255,Math.round(g*bright))},${Math.min(255,Math.round(b*bright))})`;
}

function toggleVoice(){
  if(listening){stopVoice();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('음성인식은 Chrome에서만 작동해요.');return;}
  recognition=new SR();
  recognition.lang='ko-KR';recognition.continuous=true;recognition.interimResults=false;
  recognition.onresult=e=>{ const t=e.results[e.results.length-1][0].transcript.trim(); handleVoiceCmd(t); };
  recognition.onerror=()=>stopVoice();
  recognition.onend=()=>{if(listening){try{recognition.start();}catch(e){}}};
  recognition.start(); listening=true;
  document.getElementById('voiceBtn').classList.add('listening');
  document.getElementById('voiceBtnLabel').textContent='듣는 중… (탭하여 종료)';
}
function stopVoice(){
  listening=false;
  if(recognition){try{recognition.stop();}catch(e){}}
  document.getElementById('voiceBtn').classList.remove('listening');
  document.getElementById('voiceBtnLabel').textContent='음성으로 조정하기';
}
function handleVoiceCmd(text){
  document.getElementById('voiceTranscript').innerHTML='인식됨: <b>"'+text+'"</b>';
  const t=text.replace(/\s/g,'');
  const STEP=15; let matched=false;

  // 섹션 선택
  const sectionMap = {
    '크라운':'crown','정수리':'crown',
    '프론트':'front','앞머리':'front',
    '템플':'temple','관자':'temple',
    '사이드':'side','옆머리':'side',
    '후두부':'occipital','뒤통수':'occipital',
    '네이프':'nape','목선':'nape',
  };
  let targetSection = state.currentSection;
  Object.entries(sectionMap).forEach(([kw,sid])=>{ if(t.includes(kw)) targetSection=sid; });

  const adj=(param,delta)=>{
    const s=state.sections[targetSection];
    if(s[param]===undefined) return;
    s[param]=Math.max(0,Math.min(100,s[param]+delta));
    propagateSectionChange(targetSection,param);
    buildSectionTabs(); matched=true;
  };
  const has=arr=>arr.some(kw=>t.includes(kw));

  if(has(['길게','늘려','길이늘','더길'])) adj('length',STEP);
  else if(has(['짧게','줄여','길이줄','더짧'])) adj('length',-STEP);
  else if(has(['볼륨추가','볼륨올','볼륨업','풍성'])) adj('volume',STEP);
  else if(has(['볼륨줄','볼륨내','납작'])) adj('volume',-STEP);
  else if(has(['컬추가','웨이브추가','더컬'])){state._globalCurl=Math.min(100,state._globalCurl+STEP);matched=true;}
  else if(has(['펴줘','컬줄','스트레이트','직모'])){state._globalCurl=Math.max(0,state._globalCurl-STEP);matched=true;}
  else if(t.includes('다음각도')||t.includes('다음앵글')){ cycleAngle(1); matched=true; }
  else if(t.includes('이전각도')||t.includes('이전앵글')){ cycleAngle(-1); matched=true; }
  else if(t.includes('비교')||t.includes('완료')){ navTo('compare'); matched=true; }
  else if(t.includes('초기화')||t.includes('리셋')){ resetSections(); matched=true; }

  if(matched){ document.getElementById('slider-globalCurl').value=state._globalCurl; document.getElementById('val-globalCurl').textContent=state._globalCurl; drawAdjustPreview(); }
  else showToast('명령을 이해하지 못했어요: "'+text+'"');
}
function cycleAngle(dir){
  let idx=ANGLES.indexOf(state.currentViewAngle);
  idx=(idx+dir+4)%4; state.currentViewAngle=ANGLES[idx];
  renderAngleSwitch('angleSwitch'); renderAngleSwitch('angleSwitchCompare');
  drawAdjustPreview(); drawCompare();
}

function showAI(text,sub){
  document.getElementById('aiOverlayText').textContent=text;
  document.getElementById('aiOverlaySub').textContent=sub;
  document.getElementById('aiOverlay').classList.remove('hidden');
}
function hideAI(){ document.getElementById('aiOverlay').classList.add('hidden'); }

let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

function startNewCustomer(){
  aiAnalysis=null;
  ANGLES.forEach(a=>{state.shots[a]=null;state.hairCanvases[a]=null;state.hairMasks[a]=null;state.baseCanvases[a]=null;});
  state.landmarks = {};
  state.selectedStyle=null; state.currentCaptureIndex=0; state.currentSection='crown';
  // 섹션 초기화
  SECTION_ORDER.forEach(id=>{
    state.sections[id] = {...SECTIONS[id].defaults};
  });
  state._globalCurl = 30;
  document.getElementById('aiAnalysisCard').style.display='none';
  document.querySelectorAll('.style-card').forEach(c=>c.classList.remove('ai-recommended','selected'));
  document.getElementById('toAdjustBtn').disabled=true;
  ['style','adjust','compare'].forEach(id=>{ const t=document.getElementById('nav-'+id); if(t) t.disabled=true; });
  updateAngleUI();
  navTo('capture');
}
</script>
