<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>결 GYEOL — 스타일 프리뷰</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1B1816; --surface:#242019; --surface-2:#2D2820; --line:#3A332B;
  --accent:#C98A4B; --accent-soft:#E8C39E; --text:#F3ECE2; --text-muted:#9C9183;
  --ok:#8FA888; --warn:#C2685A;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* ── HEADER ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:env(safe-area-inset-top,14px) 20px 12px;
  padding-top:max(env(safe-area-inset-top),14px);
  background:var(--surface);border-bottom:1px solid var(--line);flex-shrink:0;
  min-height:54px;
}
.brand-mark{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--accent-soft);}
.stage-pill{
  font-size:11px;letter-spacing:1px;text-transform:uppercase;
  background:var(--surface-2);border:1px solid var(--line);
  padding:4px 10px;border-radius:20px;color:var(--text-muted);
}
.stage-pill b{color:var(--accent-soft);font-weight:600;}

main{flex:1;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;}
.screen.active{display:flex;}

/* ── BOTTOM NAV ── */
.bottom-nav{
  display:flex;background:var(--surface);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0;
}
.nav-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 4px;cursor:pointer;border:none;background:none;
  color:var(--text-muted);font-size:10px;letter-spacing:0.5px;
  transition:color .15s;
}
.nav-tab .icon{font-size:18px;}
.nav-tab.active{color:var(--accent-soft);}
.nav-tab:disabled{opacity:0.35;cursor:not-allowed;}

/* ── BUTTONS ── */
.btn{
  border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;
  border-radius:12px;padding:13px 20px;font-size:14px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .1s,opacity .15s;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent);color:#1B1816;}
.btn-primary:disabled{background:var(--surface-2);color:var(--text-muted);cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--line);}
.btn-block{width:100%;}

/* ── SCREEN 1: CAPTURE ── */
#screen-capture{background:var(--bg);}
.capture-video-wrap{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:#0a0907;
}
#video{width:100%;height:100%;object-fit:cover;display:block;}
.cam-off-msg{color:var(--text-muted);font-size:13px;text-align:center;padding:0 32px;line-height:1.8;position:absolute;}
#shotPreview{width:100%;height:100%;object-fit:cover;display:none;position:absolute;inset:0;}
.face-guide-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.cap-hint{
  position:absolute;bottom:14px;left:0;right:0;text-align:center;
  font-size:13px;color:var(--accent-soft);
  background:rgba(27,24,22,0.6);padding:6px;
}

/* angle strip */
.angle-strip{
  display:flex;gap:0;background:var(--surface);border-top:1px solid var(--line);
  flex-shrink:0;
}
.angle-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 4px;cursor:pointer;position:relative;border-right:1px solid var(--line);
}
.angle-item:last-child{border-right:none;}
.angle-item.current::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);
}
.angle-thumb{
  width:36px;height:36px;border-radius:6px;
  background:var(--surface-2);overflow:hidden;display:flex;align-items:center;justify-content:center;
}
.angle-thumb img{width:100%;height:100%;object-fit:cover;}
.angle-name{font-size:10px;color:var(--text-muted);letter-spacing:0.5px;}
.angle-check{font-size:11px;color:var(--ok);}

.capture-actions{
  display:flex;gap:10px;padding:12px 16px;
  background:var(--surface);flex-shrink:0;
}
.shutter-btn{
  width:60px;height:60px;border-radius:50%;
  background:var(--accent);border:4px solid rgba(201,138,75,0.3);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:transform .1s;align-self:center;
}
.shutter-btn:active{transform:scale(0.92);}
.cap-right{flex:1;display:flex;flex-direction:column;gap:8px;}
.dial-row{display:flex;align-items:center;gap:10px;}
.dial-mini{position:relative;width:44px;height:44px;flex-shrink:0;}
.dial-mini svg{width:100%;height:100%;}
.dial-mini-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);}
.cap-hint-small{font-size:12px;color:var(--accent-soft);flex:1;}
.cap-btns{display:flex;gap:8px;}

/* ── SCREEN 2: STYLE ── */
#screen-style{overflow:hidden;}
.style-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 4px;}
.style-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.style-card{
  background:var(--surface);border:1.5px solid var(--line);border-radius:14px;
  padding:12px;cursor:pointer;transition:border-color .15s,transform .1s;
  display:flex;flex-direction:column;gap:7px;
}
.style-card:active{transform:scale(0.98);}
.style-card.selected{border-color:var(--accent);}
.style-card.ai-recommended{border-color:var(--ok);}
.style-icon-box{height:80px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.style-card .name{font-size:13px;font-weight:600;}
.style-card .tags{font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;}
.style-card .ai-rec{font-size:10px;color:var(--ok);display:none;}
.style-card.ai-recommended .ai-rec{display:block;}
.style-footer{display:flex;padding:10px 14px 14px;gap:8px;flex-shrink:0;}

/* ── SCREEN 3: ADJUST ── */
#screen-adjust{overflow:hidden;}
.adjust-preview{
  height:45vh;position:relative;overflow:hidden;flex-shrink:0;
  background:var(--surface);
}
.adjust-preview canvas{width:100%;height:100%;display:block;}
.preview-tag{
  position:absolute;top:10px;left:10px;
  background:rgba(27,24,22,0.75);backdrop-filter:blur(4px);
  padding:4px 10px;border-radius:8px;font-size:11px;color:var(--accent-soft);
}
.seg-status{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:11px;color:var(--text-muted);}

.adjust-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 20px;}
.adjust-controls{display:flex;flex-direction:column;gap:14px;}

.angle-switch{display:flex;gap:5px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:4px;}
.angle-switch button{flex:1;background:transparent;border:none;color:var(--text-muted);padding:7px 0;font-size:11px;border-radius:7px;cursor:pointer;font-family:'JetBrains Mono',monospace;}
.angle-switch button.on{background:var(--accent);color:#1B1816;font-weight:600;}

.ai-card{background:var(--surface);border:1px solid var(--accent);border-radius:12px;padding:12px 14px;}
.ai-card-hdr{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--accent-soft);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.ai-card-body{font-size:12px;color:var(--text-muted);line-height:1.7;margin-bottom:8px;}
.ai-tags{display:flex;flex-wrap:wrap;gap:5px;}
.ai-tag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:20px;background:var(--surface-2);border:1px solid var(--line);color:var(--accent-soft);}

.slider-block{display:flex;flex-direction:column;gap:7px;}
.slider-row{display:flex;justify-content:space-between;align-items:baseline;}
.slider-label{font-size:13px;font-weight:600;}
.slider-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent-soft);}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--line);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid var(--bg);}

.voice-box{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:8px;}
.voice-btn{display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 12px;border-radius:9px;background:var(--surface-2);transition:background .15s;}
.voice-btn.listening{background:var(--warn);}
.voice-dot{width:9px;height:9px;border-radius:50%;background:var(--text-muted);flex-shrink:0;}
.voice-btn.listening .voice-dot{background:#fff;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.voice-transcript{font-size:11px;color:var(--text-muted);line-height:1.5;}
.voice-transcript b{color:var(--accent-soft);font-weight:600;}
.voice-hints{font-size:10px;color:var(--text-muted);line-height:1.8;font-family:'JetBrains Mono',monospace;}

/* ── SCREEN 4: COMPARE ── */
#screen-compare{overflow:hidden;}
.compare-wrap{flex:1;position:relative;overflow:hidden;}
.compare-base{width:100%;height:100%;display:block;}
.compare-clip{position:absolute;top:0;bottom:0;left:0;overflow:hidden;width:50%;}
.compare-clip canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
.compare-divider{position:absolute;top:0;bottom:0;width:3px;background:var(--accent);left:50%;transform:translateX(-50%);cursor:ew-resize;touch-action:none;}
.compare-divider::after{content:'◂▸';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--accent);color:#1B1816;font-size:10px;padding:5px 6px;border-radius:20px;letter-spacing:2px;}
.compare-label{position:absolute;top:10px;font-size:10px;letter-spacing:1px;padding:4px 9px;background:rgba(27,24,22,0.7);border-radius:7px;color:var(--text-muted);}
.compare-label.before{left:10px;}
.compare-label.after{right:10px;color:var(--accent-soft);}
.compare-bottom{padding:10px 14px 14px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;}

/* ── OVERLAYS ── */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface-2);border:1px solid var(--line);
  padding:10px 18px;border-radius:12px;font-size:13px;
  opacity:0;pointer-events:none;transition:all .25s;z-index:50;
  white-space:nowrap;max-width:90vw;white-space:normal;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.ai-overlay{
  position:fixed;inset:0;background:rgba(27,24,22,0.92);z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  backdrop-filter:blur(6px);
}
.ai-overlay.hidden{display:none;}
.ai-spinner{width:40px;height:40px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ai-overlay-text{font-size:14px;color:var(--accent-soft);}
.ai-overlay-sub{font-size:12px;color:var(--text-muted);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px;}

/* ── SECTION TABS ── */
.section-tab{
  background:var(--surface);border:1.5px solid var(--line);border-radius:12px;
  overflow:hidden;transition:border-color .15s;
}
.section-tab.active{border-color:var(--accent);}
.section-tab-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;cursor:pointer;
}
.section-tab-left{display:flex;align-items:center;gap:10px;}
.section-badge{
  font-size:9px;letter-spacing:1px;font-family:'JetBrains Mono',monospace;
  padding:3px 7px;border-radius:6px;
  background:var(--surface-2);color:var(--text-muted);border:1px solid var(--line);
}
.section-tab.active .section-badge{background:var(--accent);color:#1B1816;border-color:var(--accent);}
.section-tab-name{font-size:13px;font-weight:600;color:var(--text);}
.section-tab-desc{font-size:10px;color:var(--text-muted);}
.section-tab-summary{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--accent-soft);}
.section-tab-body{
  padding:0 14px 14px;display:none;flex-direction:column;gap:12px;
  border-top:1px solid var(--line);padding-top:12px;
}
.section-tab.active .section-tab-body{display:flex;}
.param-label-row{display:flex;justify-content:space-between;align-items:baseline;}
.param-label{font-size:12px;color:var(--text-muted);}
.param-val{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--accent-soft);}
.section-affects{font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;margin-top:2px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand-mark">결</div>
    <div class="stage-pill" id="stageLabel">단계 <b>1/4 · 촬영</b></div>
  </header>
  <main>

    <!-- ══ SCREEN 1: CAPTURE ══ -->
    <section class="screen active" id="screen-capture">
      <div class="capture-video-wrap">
        <div class="cam-off-msg" id="camOffMsg">카메라를 불러오는 중…<br><span style="font-size:11px;">아래 업로드 버튼도 이용 가능해요</span></div>
        <video id="video" autoplay playsinline muted></video>
        <img id="shotPreview">
        <svg class="face-guide-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
          <ellipse cx="50" cy="38" rx="34" ry="46" fill="none" stroke="rgba(232,195,158,0.55)" stroke-width="0.7" stroke-dasharray="3 3"/>
        </svg>
        <div class="cap-hint" id="captureHint">정면을 가이드 안에 맞춰주세요</div>
      </div>

      <!-- angle strip -->
      <div class="angle-strip" id="angleStrip">
        <div class="angle-item current" id="card-front" onclick="jumpToAngle(0)">
          <div class="angle-thumb" id="thumb-front"></div>
          <div class="angle-name">정면</div>
          <div class="angle-check" id="chk-front"></div>
        </div>
        <div class="angle-item" id="card-left" onclick="jumpToAngle(1)">
          <div class="angle-thumb" id="thumb-left"></div>
          <div class="angle-name">좌측</div>
          <div class="angle-check" id="chk-left"></div>
        </div>
        <div class="angle-item" id="card-right" onclick="jumpToAngle(2)">
          <div class="angle-thumb" id="thumb-right"></div>
          <div class="angle-name">우측</div>
          <div class="angle-check" id="chk-right"></div>
        </div>
        <div class="angle-item" id="card-back" onclick="jumpToAngle(3)">
          <div class="angle-thumb" id="thumb-back"></div>
          <div class="angle-name">후면</div>
          <div class="angle-check" id="chk-back"></div>
        </div>
      </div>

      <div class="capture-actions">
        <button class="shutter-btn" onclick="captureCurrentAngle()">📷</button>
        <div class="cap-right">
          <div class="dial-row">
            <div class="dial-mini">
              <svg viewBox="0 0 100 100">
                <circle class="seg" id="seg0" cx="50" cy="50" r="42" fill="none" stroke="#3A332B" stroke-width="6" stroke-dasharray="65 197" transform="rotate(-90 50 50)"/>
                <circle class="seg" id="seg1" cx="50" cy="50" r="42" fill="none" stroke="#3A332B" stroke-width="6" stroke-dasharray="65 197" stroke-dashoffset="-65" transform="rotate(-90 50 50)"/>
                <circle class="seg" id="seg2" cx="50" cy="50" r="42" fill="none" stroke="#3A332B" stroke-width="6" stroke-dasharray="65 197" stroke-dashoffset="-130" transform="rotate(-90 50 50)"/>
                <circle class="seg" id="seg3" cx="50" cy="50" r="42" fill="none" stroke="#3A332B" stroke-width="6" stroke-dasharray="65 197" stroke-dashoffset="-195" transform="rotate(-90 50 50)"/>
              </svg>
              <div class="dial-mini-center" id="dialCenter">0/4</div>
            </div>
            <div class="cap-hint-small" id="capHintSmall">촬영 버튼을 눌러주세요</div>
          </div>
          <div class="cap-btns">
            <button class="btn btn-ghost" style="flex:1;font-size:12px;padding:9px 8px;" onclick="retakeCurrent()">재촬영</button>
            <button class="btn btn-ghost" style="flex:1;font-size:12px;padding:9px 8px;" onclick="document.getElementById('fileInput').click()">업로드</button>
            <button class="btn btn-primary" id="toStyleBtn" style="flex:1;font-size:12px;padding:9px 8px;" onclick="navTo('style')" disabled>다음→</button>
          </div>
        </div>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileUpload(event)">
    </section>

    <!-- ══ SCREEN 2: STYLE ══ -->
    <section class="screen" id="screen-style">
      <div class="style-scroll">
        <div class="style-grid" id="styleGrid"></div>
      </div>
      <div class="style-footer">
        <button class="btn btn-ghost" style="flex:1;" onclick="navTo('capture')">← 촬영</button>
        <button class="btn btn-primary" id="toAdjustBtn" style="flex:2;" onclick="navTo('adjust')" disabled>조정하기 →</button>
      </div>
    </section>

    <!-- ══ SCREEN 3: ADJUST ══ -->
    <section class="screen" id="screen-adjust">
      <div class="adjust-preview">
        <canvas id="adjustCanvas"></canvas>
        <div class="preview-tag" id="adjustStyleTag">스타일 미선택</div>
        <div class="seg-status" id="segStatus"></div>
      </div>
      <div class="adjust-scroll">
        <div class="adjust-controls">

          <!-- 뷰 전환 (정면/좌/우/후) -->
          <div class="angle-switch" id="angleSwitch"></div>

          <!-- AI 분석 카드 -->
          <div class="ai-card" id="aiAnalysisCard" style="display:none;">
            <div class="ai-card-hdr"><div class="ai-dot"></div>AI 분석</div>
            <div class="ai-card-body" id="aiAnalysisText"></div>
            <div class="ai-tags" id="aiAnalysisTags"></div>
          </div>

          <!-- 섹션 탭 (미용사 커트 순서) -->
          <div id="sectionTabs" style="display:flex;flex-direction:column;gap:10px;"></div>

          <!-- 컬/웨이브: 전체 공통 -->
          <div class="slider-block" style="border-top:1px solid var(--line);padding-top:12px;">
            <div class="slider-row">
              <span class="slider-label" style="color:var(--text-muted);font-size:12px;">컬 / 웨이브 (전체)</span>
              <span class="slider-val" id="val-globalCurl">30</span>
            </div>
            <input type="range" id="slider-globalCurl" min="0" max="100" value="30"
              oninput="onGlobalCurl(this.value)">
          </div>

          <div class="voice-box">
            <div class="voice-btn" id="voiceBtn" onclick="toggleVoice()">
              <div class="voice-dot"></div>
              <span id="voiceBtnLabel" style="font-size:13px;font-weight:600;">음성으로 조정하기</span>
            </div>
            <div class="voice-transcript" id="voiceTranscript">예: "크라운 길게", "네이프 짧게", "볼륨 추가"</div>
            <div class="voice-hints">크라운·프론트·템플·사이드·후두부·네이프 + 길게·짧게·볼륨·컬</div>
          </div>

          <button class="btn btn-ghost" style="font-size:12px;padding:10px;" onclick="resetSections()">초기화</button>
          <div style="height:4px;"></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;padding:10px 14px 14px;flex-shrink:0;">
        <button class="btn btn-ghost" style="flex:1;font-size:13px;" onclick="navTo('style')">← 스타일</button>
        <button class="btn btn-primary" style="flex:2;font-size:13px;" onclick="navTo('compare')">비교 보기 →</button>
      </div>
    </section>

    <!-- ══ SCREEN 4: COMPARE ══ -->
    <section class="screen" id="screen-compare">
      <div class="compare-wrap" id="comparePane">
        <canvas id="compareBaseCanvas" class="compare-base"></canvas>
        <div class="compare-clip" id="compareClip">
          <canvas id="compareTopCanvas"></canvas>
        </div>
        <div class="compare-divider" id="compareDivider"></div>
        <div class="compare-label before">BEFORE</div>
        <div class="compare-label after">AFTER</div>
      </div>
      <div class="compare-bottom">
        <div class="angle-switch" id="angleSwitchCompare"></div>
        <div style="display:flex;gap:8px;">

<!-- MediaPipe Tasks Vision: ES 모듈로만 배포되므로 classic <script src> 태그로는
     window.FilesetResolver 등 전역이 전혀 생성되지 않는다 (실제 원인이었던 버그).
     아래 loadVisionModule()에서 동적 import()로 직접 불러온다. -->
<script>
let __visionModulePromise = null;
function loadVisionModule(){
  if(!__visionModulePromise){
    __visionModulePromise = import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9');
  }
  return __visionModulePromise;
}
</script>
<script>
/* ════════════════════════════════════════
   FACE LANDMARKER
   yaw/pitch 계산 + 랜드마크 기반 섹션 경계 보정
════════════════════════════════════════ */
let faceLandmarker = null;
let faceLandmarkerReady = false;

async function initFaceLandmarker(){
  try{
    const { FaceLandmarker: FL, FilesetResolver: FR } = await loadVisionModule();
    if(!FL || !FR){ console.warn('FaceLandmarker API 없음'); return; }
    const fs = await FR.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm'
    );
    faceLandmarker = await FL.createFromOptions(fs, {
      baseOptions:{
        modelAssetPath:'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate:'GPU'
      },
      runningMode:'IMAGE', numFaces:1,
    });
    faceLandmarkerReady = true;
    console.log('Face Landmarker 준비 완료');
  } catch(e){
    faceLandmarkerReady = false;
    window.__lmDiag = 'init 실패: ' + (e && e.message ? e.message : e);
    console.warn('Face Landmarker 로드 실패:', e);
  }
}
initFaceLandmarker();

async function detectFaceLandmarks(angle){
  if(!faceLandmarkerReady || !faceLandmarker) return null;
  const dataUrl = state.shots[angle]; if(!dataUrl) return null;
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{
      try{
        const result = faceLandmarker.detect(img);
        if(!result||!result.faceLandmarks||!result.faceLandmarks.length){
          window.__lmDiag = `[${angle}] 얼굴 감지 실패 (얼굴 없음/각도 과함)`;
          console.warn(window.__lmDiag);
          resolve(null); return;
        }
        const lm = result.faceLandmarks[0];
        const nose     = lm[1];
        const lEar     = lm[234];
        const rEar     = lm[454];
        const lEye     = lm[33];
        const rEye     = lm[263];
        const chin     = lm[152];
        const forehead = lm[10];
        const earCX    = (lEar.x + rEar.x) / 2;
        const earSpan  = Math.abs(rEar.x - lEar.x);
        const yaw      = earSpan > 0.01 ? (nose.x - earCX) / (earSpan * 0.5) : 0;
        const eyeY     = (lEye.y + rEye.y) / 2;
        const earY     = (lEar.y + rEar.y) / 2;
        const info = { yaw, foreheadY:forehead.y, eyeY, earY, chinY:chin.y,
                       lEarX:lEar.x, rEarX:rEar.x };
        state.landmarks = state.landmarks || {};
        state.landmarks[angle] = info;
        resolve(info);
      } catch(e){
        window.__lmDiag = `[${angle}] detect() 예외: ` + (e && e.message ? e.message : e);
        console.warn('랜드마크 추출 실패:', e);
        resolve(null);
      }
    };
    img.onerror = ()=>resolve(null);
    img.src = dataUrl;
  });
}

// ── 랜드마크 실패 시 비율 기반 폴백 ──
// Face Landmarker 로딩/감지가 실패해도 얼굴 제거 박스, 어깨 컷오프,
// 귀·프론트 보강 로직이 완전히 꺼지지 않도록, 이 앱 촬영 가이드(얼굴을
// 프레임 중앙에 맞추는 캡처 UI) 기준의 대략적인 표준 비율로 대체한다.
// 실측 랜드마크보다는 부정확하지만, "전혀 동작 안 함"보다는 훨씬 낫다.
function getEstimatedLandmarks(angle){
  const isSideView = (angle === 'left' || angle === 'right');
  return {
    yaw: 0,
    foreheadY: 0.14,
    eyeY: 0.34,
    earY: 0.40,
    chinY: 0.60,
    // 측면 사진은 얼굴이 한쪽으로 치우쳐 보이므로 귀 x좌표 범위를 좁혀
    // earSpan이 작게 나오도록 해서(> 0.08 조건 실패) 옆머리를 과도하게
    // 지우지 않는 "거의 완전 측면" 분기를 타게 한다.
    lEarX: isSideView ? 0.42 : 0.28,
    rEarX: isSideView ? 0.58 : 0.72,
  };
}

function refineSectionBoundaries(angle){
  const lm = state.landmarks && state.landmarks[angle]; if(!lm) return;
  // Y 경계: 랜드마크 기반 실제 해부학적 위치로 보정
  SECTIONS.crown.yRange     = [0,                    lm.foreheadY * 0.95];
  SECTIONS.front.yRange     = [lm.foreheadY * 0.85,  lm.eyeY * 1.05];
  SECTIONS.temple.yRange    = [lm.eyeY * 0.9,        lm.earY * 1.05];
  SECTIONS.side.yRange      = [lm.earY * 0.85,       lm.earY * 1.40];
  SECTIONS.occipital.yRange = [lm.earY * 1.10,       lm.chinY * 0.90];
  SECTIONS.nape.yRange      = [lm.chinY * 0.78,      1.0];
  const lx = Math.min(lm.lEarX, lm.rEarX);
  const rx = Math.max(lm.lEarX, lm.rEarX);
  SECTIONS.crown.xRange  = [lx * 0.3,  rx + (1-rx)*0.7];
  SECTIONS.front.xRange  = [lx * 0.55, rx + (1-rx)*0.45];
  SECTIONS.side.xRange   = [lx * 0.1,  rx + (1-rx)*0.9]; // 사이드는 넓게
  console.log('[' + angle + '] yaw=' + lm.yaw.toFixed(2) + ' 섹션 경계 보정됨');
}

/* ────────────────────────────────────────
   4장 사진 랜드마크 매핑 테이블
   공통 기준점(귀/코/눈/턱)으로 뷰 간 섹션 연동 가중치 자동 산출
──────────────────────────────────────── */
function buildViewMapping(){
  const lms = state.landmarks; // {front, left, right, back}
  if(!lms) return;

  // 각 섹션별 뷰 가중치 산출
  // 기준: 해당 뷰의 랜드마크에서 그 섹션이 이미지 어느 비율에 있는지
  // → 랜드마크가 있는 뷰는 실제 계산, 없는 뷰는 해부학 기본값 사용
  const mapping = {};

  // CROWN: 이마 위 → 4뷰 모두 100% (정수리는 어느 방향에서나 동일)
  mapping.crown = { front:1.0, left:1.0, right:1.0, back:1.0 };

  // FRONT: 앞머리 → 정면100%, 측면은 yaw 기반 연결감
  const frontYaw_l = lms.left  ? Math.abs(lms.left.yaw)  : 0.7;
  const frontYaw_r = lms.right ? Math.abs(lms.right.yaw) : 0.7;
  mapping.front = {
    front: 1.0,
    left:  Math.max(0, 1.0 - frontYaw_l * 1.2),  // 측면일수록 프론트 영향 감소
    right: Math.max(0, 1.0 - frontYaw_r * 1.2),
    back:  0.0
  };

  // TEMPLE: 측면-정면 연결부
  mapping.temple = {
    front: lms.front ? Math.min(1.0, (1.0 - Math.abs(lms.front.yaw||0)) * 0.9 + 0.2) : 0.7,
    left:  0.85,
    right: 0.85,
    back:  0.15
  };

  // SIDE: 귀 옆 → 측면 100%, 정면/후면은 귀 위치 기반
  const sideW_front = lms.front
    ? Math.max(0, Math.min(0.5, (lms.front.rEarX - lms.front.lEarX) * 0.6))
    : 0.3;
  mapping.side = { front: sideW_front, left: 1.0, right: 1.0, back: 0.45 };

  // OCCIPITAL: 후두부 → 후면100%, 측면 높음
  mapping.occipital = { front: 0.0, left: 0.75, right: 0.75, back: 1.0 };

  // NAPE: 목선 → 후면100%, 측면 일부
  mapping.nape = { front: 0.05, left: 0.55, right: 0.55, back: 1.0 };

  state.viewMapping = mapping;
  console.log('[매핑] 뷰 간 섹션 가중치 산출 완료', mapping);
}

// 슬라이더 값 변경 시 인접 뷰에 가중치 반영
function propagateSectionToViews(changedAngle, sectionId, paramKey, value){
  const mapping = state.viewMapping;
  if(!mapping || !mapping[sectionId]) return;

  const w = mapping[sectionId];
  const angles = ['front','left','right','back'];
  angles.forEach(angle=>{
    if(angle === changedAngle) return; // 변경한 뷰는 스킵
    const weight = w[angle] || 0;
    if(weight < 0.05) return; // 영향 없음

    if(!state.sections[angle]) state.sections[angle]={};
    if(!state.sections[angle][sectionId]) state.sections[angle][sectionId]={};

    // 기존값과 가중치 블렌딩 (급격한 변화 방지)
    const prev = state.sections[angle][sectionId][paramKey] ?? value;
    state.sections[angle][sectionId][paramKey] = Math.round(prev + (value - prev) * weight);
  });
}

let segmenterReady = false;

let mpImageSegmenter = null; // MediaPipe Tasks Vision segmenter

async function initSegmenter(){
  // ── 1차: MediaPipe Tasks Vision (hair segmentation) ──
  try{
    const { FilesetResolver: FR, ImageSegmenter: IS } = await loadVisionModule();
    const vision = await FR.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm'
    );
    mpImageSegmenter = await IS.createFromOptions(vision, {
      baseOptions:{
        modelAssetPath:'https://storage.googleapis.com/mediapipe-models/image_segmenter/hair_segmenter/float32/1/hair_segmenter.tflite',
        delegate:'GPU',
      },

    console.warn('MediaPipe Hair Segmenter 실패, TF.js 폴백:', e);
  }

  // ── 2차 폴백: TF.js SelfieSegmentation ──
  try{
    await tf.ready();
    await tf.setBackend('webgl');
    segmenter = await bodySegmentation.createSegmenter(
      bodySegmentation.SupportedModels.MediaPipeSelfieSegmentation,

    );

    segmenter = null;
    segmenterError = true;
    state.segmenterType = '실패';
  }
}

// ── 개발 스위치: 랜드마크 기반 후처리(얼굴제거박스/어깨컷오프/귀·프론트 보강) ──
// MediaPipe가 window.FilesetResolver 버그로 계속 TF.js로 폴백되던 동안 쌓인 패치들이라,
// 실제 MediaPipe hair_segmenter 마스크 특성에 맞춰 검증된 적이 없음.
// MediaPipe가 정상 동작하는 지금, 일단 다 끄고 순수 MediaPipe 마스크 + 최소 노이즈 정리만
// 확인한 뒤, 실제로 필요한 것만 골라 다시 켠다.
const ENABLE_LANDMARK_POSTPROCESS = false;

async function extractHairMask(angle){
  const dataUrl = state.shots[angle];
  if(!dataUrl || !segmenter) return false;

  return new Promise(resolve=>{
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = async()=>{
      try{
        const maxDim = 512;
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);

        const srcC = document.createElement('canvas');
        srcC.width=w; srcC.height=h;
        const srcCtx = srcC.getContext('2d');
        srcCtx.drawImage(img, 0, 0, w, h);
        const srcPixels = srcCtx.getImageData(0,0,w,h).data;

        // 마스크 버퍼 (0=background, 255=hair) — 축소 해상도에서 작업
        let hairMaskBuf = new Uint8Array(w * h);

        if(mpImageSegmenter){
          // ── MediaPipe hair_segmenter path ──
          const result = mpImageSegmenter.segment(srcC);
          const catMask = result.categoryMask;
          const maskArr = catMask.getAsUint8Array();
          for(let i=0;i<maskArr.length;i++){
            hairMaskBuf[i] = maskArr[i] === 1 ? 255 : 0;
          }
          catMask.close();
        } else {
          // ── TF.js SelfieSegmentation 폴백 ──
          const segs = await segmenter.segmentPeople(srcC, {
            multiSegmentation: false,
            segmentBodyParts: false,
          });
          // TF.js 사람 마스크 + HSV hair 색상 필터 (마스크 실패시 상단 영역 HSV만 사용)
          let personMaskData = null;
          if(segs && segs.length>0){
            try{
              const binaryMask = await bodySegmentation.toBinaryMask(
                segs,
                {r:255,g:255,b:255,a:255},
                {r:0,g:0,b:0,a:0},
                false, 0.5
              );
              personMaskData = binaryMask.data;
            } catch(e){ personMaskData = null; }
          }

          // 사람 마스크가 있으면 마스크 내에서, 없으면 상단 60% 전체에서 HSV 필터
          const topLimit = Math.round(h * 0.60);
          for(let i=0;i<w*h;i++){
            const iy = Math.floor(i/w);
            const inRegion = personMaskData
              ? personMaskData[i*4+3] > 128
              : iy < topLimit;
            if(inRegion){
              const r=srcPixels[i*4], g=srcPixels[i*4+1], b=srcPixels[i*4+2];
              if(isHairColor(r,g,b)) hairMaskBuf[i]=255;
            }
          }
        }

        // ── 이하 랜드마크 기반 후처리는 세그멘터 종류(MediaPipe/TF.js)와
        // 무관하게 항상 적용한다. (이전엔 TF.js 폴백 분기 안에만 있어서,
        // MediaPipe 1차 세그멘터가 성공하면 얼굴제거박스·어깨컷오프·
        // 귀/프론트 보강이 전부 스킵되는 구조적 버그가 있었음)

        // ── 얼굴 영역 제거: 랜드마크 기반 동적 박스 ──
        // 기존 고정 좌표(가로 25~75%) 박스는 "얼굴이 항상 화면 중앙"이라고 가정해서
        // 측면(좌/우) 사진에서는 얼굴이 한쪽으로 치우쳐 있어 반대쪽 옆머리까지 같이 지워버렸음.
        // Face Landmarker로 실제 눈/귀/턱 위치를 알면 그 범위에 맞춰서만 지운다.
        // 실측 랜드마크가 있으면 그대로, 없으면 비율 기반 추정치로 대체
        // (이전엔 랜드마크 실패 시 이 블록 전체가 꺼지고 보수적 고정 박스로만
        // 폴백했는데, 그러면 아래의 귀/프론트 보강·동적 어깨컷오프까지
        // 전부 같이 무효화됨 → 항상 lm이 존재하도록 바꿔서 그 문제를 없앰)
        const lmReal = state.landmarks && state.landmarks[angle];
        const lm = lmReal || getEstimatedLandmarks(angle);
        const lmEstimated = !lmReal;
        // 얼굴제거박스가 실제로 지운 픽셀을 별도 기록 — 아래 귀/프론트 보강 단계에서
        // "원래부터 머리카락이 아니었던 곳"과 절대 혼동하지 않고 재채움을 막기 위함
        const faceExcludeMask = new Uint8Array(w*h);
        if(ENABLE_LANDMARK_POSTPROCESS){
        {
          const yTop    = Math.max(0, lm.foreheadY * 0.95);
          const yBottom = Math.min(1, lm.chinY * 0.92);
          const earSpan = Math.abs(lm.rEarX - lm.lEarX);
          let xLeft, xRight;
          if(earSpan > 0.08){
            // 양쪽 귀가 충분히 떨어져 보이는 경우 (정면~약한 측면): 귀 안쪽만 지움
            xLeft  = Math.min(lm.lEarX, lm.rEarX) + earSpan*0.12;
            xRight = Math.max(lm.lEarX, lm.rEarX) - earSpan*0.12;
          } else {
            // 거의 완전 측면(반대쪽 귀가 가려져 earSpan이 비정상적으로 작음):
            // 화면 폭 35%의 좁은 범위만 안전하게 제거 (얼굴 중심부 추정, 옆머리는 보존)
            const cx = (lm.lEarX + lm.rEarX) / 2;
            xLeft  = cx - 0.175;
            xRight = cx + 0.175;
          }
          const yS = Math.round(yTop*h), yE = Math.round(yBottom*h);
          const xS = Math.round(Math.max(0,xLeft)*w), xE = Math.round(Math.min(1,xRight)*w);
          for(let y=yS; y<yE; y++){
            for(let x=xS; x<xE; x++){
              if(x>=0&&x<w&&y>=0&&y<h){ hairMaskBuf[y*w+x]=0; faceExcludeMask[y*w+x]=1; }
            }
          }
        }
        // 목·어깨 제거 — 랜드마크(chinY) 기반 동적 컷오프
        // 기존 고정 70% 라인은 턱이 그보다 위/아래로 짧게 잡히는 얼굴에서
        // 어깨선(옷)이 70% 안쪽에 들어와 회색 티셔츠 그림자가 머리카락으로 오인됨.
        // 턱 끝(chinY)에서 목 길이만큼(약 1.35배) 아래를 컷오프 라인으로 잡아
        // 얼굴 크기에 비례해서 어깨선을 더 정확히 배제한다.
        const shoulderCutoffY = Math.max(Math.round(h*0.45), Math.min(Math.round(h*0.85), Math.round(lm.chinY * 1.35 * h)));
        for(let y=shoulderCutoffY; y<h; y++){
          for(let x=0;x<w;x++) hairMaskBuf[y*w+x]=0;
        }

        // ── 옆머리 빈 부분 보강: 귀 주변 한정 완화 색상 필터 ──
        // 밝은 조명을 받은 잔머리(v>=0.55, 저채도)는 기존 isHairColor 3번 조건 경계에
        // 걸려 누락되는 경우가 있음. 화면 전체가 아니라 "귀 주변 영역"에서만
        // 완화된 기준을 추가 적용해서, 과확장(옷/목까지 번지는 문제) 재발 없이
        // 옆머리(관자놀이~귀 주변) 빈 구간만 보강한다.
        // (이전: 밴드가 너무 좁아 실제 촬영 조건에서 충분히 안 잡힘 → 범위 확대)
        {
          const earXs = [lm.lEarX, lm.rEarX].filter(v=>typeof v==='number');
          const bandHalfW = 0.20; // 귀 좌우로 화면폭 20%씩 (기존 14%→확대)
          const yTopBand = Math.max(0, lm.eyeY - 0.10) * h;  // 관자놀이 위쪽까지 포함
          const yBotBand = Math.min(1, lm.earY * 1.55) * h;  // 구레나룻 아래까지 포함
          for(const ex of earXs){
            const xS = Math.round(Math.max(0, ex - bandHalfW) * w);
            const xE = Math.round(Math.min(1, ex + bandHalfW) * w);
            for(let y=Math.round(yTopBand); y<Math.round(yBotBand); y++){
              for(let x=xS; x<xE; x++){
                if(x<0||x>=w||y<0||y>=h) continue;
                const i = y*w+x;
                if(hairMaskBuf[i]>0) continue; // 이미 잡힌 픽셀은 스킵
                if(faceExcludeMask[i]) continue; // 얼굴로 판정해 지운 픽셀은 재채움 금지
                const r=srcPixels[i*4], g=srcPixels[i*4+1], b=srcPixels[i*4+2];
                if(isHairColorRelaxed(r,g,b)) hairMaskBuf[i]=255;
              }
            }
          }
          // 귀 밴드 안에서만 국소 dilate+closing으로 드문드문 잡힌 픽셀을 면으로 연결
          // (화면 전체에 적용하면 과확장 재발 위험 → 밴드 영역에만 한정)
          const bandMask = new Uint8Array(w*h);
          for(const ex of earXs){
            const xS = Math.round(Math.max(0, ex - bandHalfW) * w);
            const xE = Math.round(Math.min(1, ex + bandHalfW) * w);
            for(let y=Math.round(yTopBand); y<Math.round(yBotBand); y++){
              for(let x=xS; x<xE; x++){
                if(x>=0&&x<w&&y>=0&&y<h) bandMask[y*w+x]=hairMaskBuf[y*w+x];
              }
            }
          }
          const bandClosed = morphClose(dilate(bandMask, w, h, 2), w, h, 2);
          for(let i=0;i<w*h;i++){ if(bandClosed[i]>0 && !faceExcludeMask[i]) hairMaskBuf[i]=255; }

          // ── 프론트(앞머리) 라인 보강: 이마 경계 쪽 잔머리도 같은 방식으로 ──
          const fxS = Math.round(Math.max(0, Math.min(lm.lEarX, lm.rEarX) + Math.abs(lm.rEarX-lm.lEarX)*0.15) * w);
          const fxE = Math.round(Math.min(1, Math.max(lm.lEarX, lm.rEarX) - Math.abs(lm.rEarX-lm.lEarX)*0.15) * w);
          const fyTop = Math.max(0, lm.foreheadY * 0.85) * h;
          const fyBot = Math.min(1, lm.eyeY * 0.92) * h;
          const frontBandMask = new Uint8Array(w*h);
          for(let y=Math.round(fyTop); y<Math.round(fyBot); y++){
            for(let x=fxS; x<fxE; x++){
              if(x<0||x>=w||y<0||y>=h) continue;
              const i = y*w+x;
              if(hairMaskBuf[i]===0 && !faceExcludeMask[i]){
                const r=srcPixels[i*4], g=srcPixels[i*4+1], b=srcPixels[i*4+2];
                if(isHairColorRelaxed(r,g,b)) hairMaskBuf[i]=255;
              }
              frontBandMask[i] = faceExcludeMask[i] ? 0 : hairMaskBuf[i];
            }
          }
          const frontClosed = morphClose(dilate(frontBandMask, w, h, 2), w, h, 2);
          for(let i=0;i<w*h;i++){ if(frontClosed[i]>0 && !faceExcludeMask[i]) hairMaskBuf[i]=255; }
        }
        } // ENABLE_LANDMARK_POSTPROCESS

        // ── 마스크 후처리: 컬럼 내 작은 구멍만 채움 (과확장 없이 노이즈 정리만) ──
        // 이전: earY 기반 하단 dilate + HSV 보강이 머리카락을 옷/목까지 과도하게 확장시켜 되돌림
        // 사이드 하단 인식 문제는 결방향 인식(structure tensor) 작업 이후 별도로 재검토
        hairMaskBuf = fillColumnGaps(hairMaskBuf, w, h, 6);
        hairMaskBuf = morphClose(hairMaskBuf, w, h, 3);

        const pixelCount = hairMaskBuf.filter(v=>v>0).length;
        const lmDiagPart = lmEstimated ? `추정${window.__lmDiag ? '('+window.__lmDiag+')' : ''}` : '실측';
        const segFailPart = (state.segmenterType !== 'MediaPipe' && window.__segDiag) ? ` | MP실패:${window.__segDiag}` : '';
        state._diagLog = `세그멘터:${state.segmenterType||'?'} | 마스크픽셀:${pixelCount}px | 랜드마크:${lmDiagPart}${segFailPart}`;

        // ── 결방향 인식 (Structure Tensor) ──
        // 축소 해상도(w,h)에서 계산 → 컬럼별 샘플로 다운샘플해 저장
        // (가닥 렌더링 시 매번 풀 계산하지 않고 가벼운 보간만 하도록)
        let orientationColSamples = null;
        try{
          const {angle: angleField, coherence: coherenceField} = computeHairOrientationField(srcPixels, hairMaskBuf, w, h);
          orientationColSamples = buildColumnOrientationSamples(angleField, coherenceField, hairMaskBuf, w, h, 12);
        }catch(e){
          console.warn('결방향 인식 실패, 기본 직선 모드로 폴백:', e);
          orientationColSamples = null;
        }

        // ── 축소 해상도에서 두피 라인(scalpY) 추출 ──
        // (blur 없는 clean mask에서 column별 최상단 픽셀)
        const scalpY_small   = new Float32Array(w).fill(-1);
        const hairEndY_small = new Float32Array(w).fill(-1);
        for(let x=0;x<w;x++){
          for(let y=0;y<h;y++){
            if(hairMaskBuf[y*w+x] > 0){
              if(scalpY_small[x]<0) scalpY_small[x]=y;
              hairEndY_small[x]=y;
            }
          }
        }

        // ── hairEndY_small: 양끝 -1 열을 인접 유효값으로 보간 채우기 ──
        // (forward pass)
        let lastValidEnd = -1;
        for(let x=0;x<w;x++){
          if(hairEndY_small[x]>=0) lastValidEnd=hairEndY_small[x];
          else if(lastValidEnd>=0) hairEndY_small[x]=lastValidEnd;
        }
        // (backward pass — 앞쪽 -1 채우기)
        let firstValidEnd = -1;
        for(let x=w-1;x>=0;x--){
          if(hairEndY_small[x]>=0) firstValidEnd=hairEndY_small[x];
          else if(firstValidEnd>=0) hairEndY_small[x]=firstValidEnd;
        }
        // scalpY_small도 동일하게
        let lastValidScalp = -1;
        for(let x=0;x<w;x++){
          if(scalpY_small[x]>=0) lastValidScalp=scalpY_small[x];
          else if(lastValidScalp>=0) scalpY_small[x]=lastValidScalp;
        }
        let firstValidScalp = -1;
        for(let x=w-1;x>=0;x--){
          if(scalpY_small[x]>=0) firstValidScalp=scalpY_small[x];
          else if(firstValidScalp>=0) scalpY_small[x]=firstValidScalp;
        }

        // ── earY 기반 hairEndY 강제 연장 로직 제거 ──
        // (실제 마스크에 없는 영역까지 끌어올려 옷/목까지 머리카락이 그려지는 원인이었음)
        // 사이드 하단 인식 개선은 결방향 인식 도입 후 별도로 재검토

        // 원본 해상도로 스케일업
        const invScale = 1/scale;
        const scalpY   = new Float32Array(img.width).fill(-1);
        const hairEndY = new Float32Array(img.width).fill(-1);
        for(let X=0;X<img.width;X++){
          const xSmall = Math.min(w-1, Math.round(X*scale));
          if(scalpY_small[xSmall]>=0){
            scalpY[X]   = scalpY_small[xSmall]   * invScale;
            hairEndY[X] = hairEndY_small[xSmall]  * invScale;
          }
        }

        // ── 풀 해상도 마스크 캔버스 ──
        const maskC = document.createElement('canvas');
        maskC.width=w; maskC.height=h;
        const mCtx = maskC.getContext('2d');
        const mImg = mCtx.createImageData(w,h);
        for(let i=0;i<w*h;i++){
          mImg.data[i*4]=mImg.data[i*4+1]=mImg.data[i*4+2]=255;
          mImg.data[i*4+3]=hairMaskBuf[i];
        }
        mCtx.putImageData(mImg,0,0);

        const fullMaskC = document.createElement('canvas');
        fullMaskC.width=img.width; fullMaskC.height=img.height;
        fullMaskC.getContext('2d').drawImage(maskC,0,0,img.width,img.height);

        // ── hairCanvas: 원본에서 hair 마스크 영역만 ──
        const hairC = document.createElement('canvas');
        hairC.width=img.width; hairC.height=img.height;
        const hCtx = hairC.getContext('2d');
        hCtx.drawImage(img,0,0);
        hCtx.save();
        hCtx.globalCompositeOperation='destination-in';
        hCtx.drawImage(fullMaskC,0,0);
        hCtx.restore();

        // ── baseCanvas: 원본에서 hair 영역 제거 ──
        const baseC = document.createElement('canvas');
        baseC.width=img.width; baseC.height=img.height;
        const bCtx = baseC.getContext('2d');
        bCtx.drawImage(img,0,0);
        bCtx.save();
        bCtx.globalCompositeOperation='destination-out';
        bCtx.drawImage(fullMaskC,0,0);
        bCtx.restore();

        // ── 헤어 색상 샘플링 ──
        const hairPixelData = hCtx.getImageData(0,0,img.width,img.height).data;
        let rSum=0,gSum=0,bSum=0,cnt=0;
        for(let i=0;i<img.width*img.height;i++){
          if(hairPixelData[i*4+3]>128){
            rSum+=hairPixelData[i*4]; gSum+=hairPixelData[i*4+1]; bSum+=hairPixelData[i*4+2]; cnt++;
          }
        }
        const avgHairColor = cnt>0
          ? `rgb(${Math.round(rSum/cnt)},${Math.round(gSum/cnt)},${Math.round(bSum/cnt)})`
          : '#2A1B12';

        state.hairCanvases[angle] = hairC;
        state.baseCanvases[angle] = baseC;
        state.hairMasks[angle]    = {
          scalpY, hairEndY, w:img.width, h:img.height, avgColor:avgHairColor,
          // 결방향 필드는 축소 해상도(maskW,maskH) 좌표계로 저장됨 — 사용 시 비율 변환 필요
          orientation: orientationColSamples,
          maskW: w, maskH: h
        };
        resolve(true);
      }catch(e){
        console.warn('extractHairMask 실패:', angle, e);
        resolve(false);
      }
    };
    img.src = dataUrl;
  });
}

/* ────────────────────────────────────────
   유틸: HSV hair 색상 판별 (어두운 갈색~흑색 계열)
──────────────────────────────────────── */
function isHairColor(r,g,b){
  // 흑발·갈색·금발·회색·백발(새치) 모두 인식
  const maxC=Math.max(r,g,b), minC=Math.min(r,g,b);
  const v=maxC/255;
  const s=maxC>0?(maxC-minC)/maxC:0;

  // 1) 흑발·어두운 색
  if(v<0.55) return true;

  // 2) 채도 있는 갈색/적갈색/금발 (hue 0~50 또는 300~360)
  if(s>0.15 && v<0.80){
    const hRaw=maxC>0?( maxC===r?((g-b)/(maxC-minC+0.001))%6
                      : maxC===g?((b-r)/(maxC-minC+0.001))+2
                      :           ((r-g)/(maxC-minC+0.001))+4 )*60 : 0;
    const hh=(hRaw+360)%360;
    if(hh<50||hh>300) return true;
  }

  // 3) 회색·새치·백발: 저채도이면서 밝기 0.55~0.90 구간
  //    (순수 흰색 v>0.90 및 밝은 피부색 제외)
  if(s<0.18 && v>=0.55 && v<0.90) return true;

  return false;
}

// isHairColorRelaxed: isHairColor보다 완화된 기준.
// 화면 전체가 아니라 귀 주변(옆머리) 좁은 영역에서만 보조로 사용.
// 밝은 조명을 받은 잔머리(하이라이트 진 가는 머리카락)는 채도가 낮으면서도
// 밝기가 0.90 근처까지 올라가 기존 조건(v<0.90)에서 누락되는 경우가 많아
// 밝기 상한을 완화하되, 순수 배경/피부와 헷갈리지 않도록 채도 조건은 더 좁게 유지.
function isHairColorRelaxed(r,g,b){
  const maxC=Math.max(r,g,b), minC=Math.min(r,g,b);
  const v=maxC/255;
  const s=maxC>0?(maxC-minC)/maxC:0;

  // 저채도 밝은 잔머리 (기존보다 밝기 상한 확장, 흰 배경과 구분 위해 채도 하한 살짝 요구)
  if(s<0.15 && v>=0.55 && v<0.94) return true;

  // 채도 있는 갈색/적갈색 계열, 밝기 상한 확장
  if(s>0.12 && v<0.88){
    const hRaw=maxC>0?( maxC===r?((g-b)/(maxC-minC+0.001))%6
                      : maxC===g?((b-r)/(maxC-minC+0.001))+2
                      :           ((r-g)/(maxC-minC+0.001))+4 )*60 : 0;
    const hh=(hRaw+360)%360;
    if(hh<55||hh>295) return true;
  }

  return false;
}

/* ────────────────────────────────────────
   유틸: 모폴로지 연산 (마스크 품질 향상)
──────────────────────────────────────── */
function erodeOnce(buf, w, h){
  const out = new Uint8Array(w*h);
  for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
    const i=y*w+x;
    if(buf[i]>0 && buf[i-1]>0 && buf[i+1]>0 && buf[(y-1)*w+x]>0 && buf[(y+1)*w+x]>0)
      out[i]=255;
  }
  return out;
}

// dilate: 마스크를 radius 픽셀만큼 팽창 (사이드 하단 경계 확장)
// separable(가로→세로 1차원 패스) 방식: 저사양 기기 성능을 위해 brute-force 대신 사용
// 연산량 O(w*h*r^2) → O(w*h*r) 로 대폭 감소
function dilate(buf, w, h, radius){
  if(radius<=0) return new Uint8Array(buf);
  const tmp = new Uint8Array(w*h);
  // 가로 방향 1차원 dilate
  for(let y=0;y<h;y++){
    const row=y*w;
    for(let x=0;x<w;x++){
      let v=0;
      const xs=Math.max(0,x-radius), xe=Math.min(w-1,x+radius);
      for(let nx=xs;nx<=xe;nx++){ if(buf[row+nx]>0){ v=255; break; } }
      tmp[row+x]=v;
    }
  }
  // 세로 방향 1차원 dilate
  const out = new Uint8Array(w*h);
  for(let x=0;x<w;x++){
    for(let y=0;y<h;y++){
      let v=0;
      const ys=Math.max(0,y-radius), ye=Math.min(h-1,y+radius);
      for(let ny=ys;ny<=ye;ny++){ if(tmp[ny*w+x]>0){ v=255; break; } }
      out[y*w+x]=v;
    }
  }
  return out;
}

// erode: 마스크를 radius 픽셀만큼 침식 (노이즈 제거)
// separable 방식으로 동일하게 최적화
function erode(buf, w, h, radius){
  if(radius<=0) return new Uint8Array(buf);
  const tmp = new Uint8Array(w*h);
  // 가로 방향 1차원 erode
  for(let y=0;y<h;y++){
    const row=y*w;
    for(let x=0;x<w;x++){
      let v=255;
      const xs=x-radius, xe=x+radius;
      for(let nx=xs;nx<=xe;nx++){
        if(nx<0||nx>=w||buf[row+nx]===0){ v=0; break; }
      }
      tmp[row+x]=v;
    }
  }
  // 세로 방향 1차원 erode
  const out = new Uint8Array(w*h);
  for(let x=0;x<w;x++){
    for(let y=0;y<h;y++){
      let v=255;
      const ys=y-radius, ye=y+radius;
      for(let ny=ys;ny<=ye;ny++){
        if(ny<0||ny>=h||tmp[ny*w+x]===0){ v=0; break; }
      }
      out[y*w+x]=v;
    }
  }
  return out;
}

// closing = dilate → erode: 구멍 채우기 (사이드 하단 단절 구간 연결)
function morphClose(buf, w, h, radius){
  return erode(dilate(buf, w, h, radius), w, h, radius);
}

// fillColumnGaps: 각 열에서 마스크 픽셀 사이 빈 구간을 채움
// (머리카락이 희박하게 감지된 열에서 위아래 사이 구멍 메우기)
function fillColumnGaps(buf, w, h, maxGap){
  const out = new Uint8Array(buf);
  for(let x=0;x<w;x++){
    let lastOn=-1;
    for(let y=0;y<h;y++){
      if(buf[y*w+x]>0){
        if(lastOn>=0 && (y-lastOn-1)<=maxGap){
          for(let fy=lastOn+1;fy<y;fy++) out[fy*w+x]=255;
        }
        lastOn=y;
      }
    }
  }
  return out;
}

/* ════════════════════════════════════════
   STRUCTURE TENSOR: 머리카락 결방향 인식
   ────────────────────────────────────────
   원리: 각 픽셀에서 Sobel 그래디언트(Ix, Iy)를 구하고,
   구조텐서 J = [[Ix², IxIy], [IxIy, Iy²]] 를 박스블러로 평균낸 뒤
   고유벡터 분석으로 "결 방향"(가장 변화가 적은 방향)을 추출한다.
   머리카락은 가는 선이 한 방향으로 나란히 흐르는 텍스처라
   그래디언트가 결방향에 수직으로 강하게 나타나므로,
   그 그래디언트의 수직 방향 = 머리카락이 흐르는 방향이 된다.
════════════════════════════════════════ */

// 그레이스케일 변환 (luma)
function toGrayscale(pixels, w, h){
  const gray = new Float32Array(w*h);
  for(let i=0;i<w*h;i++){
    const pi=i*4;
    gray[i] = 0.299*pixels[pi] + 0.587*pixels[pi+1] + 0.114*pixels[pi+2];
  }
  return gray;
}

// Sobel 그래디언트 (가로 Ix, 세로 Iy)
function sobelGradients(gray, w, h){
  const Ix = new Float32Array(w*h);
  const Iy = new Float32Array(w*h);
  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){
      const i = y*w+x;
      // Sobel X 커널
      const gx =
        -1*gray[(y-1)*w+(x-1)] + 1*gray[(y-1)*w+(x+1)] +
        -2*gray[y*w+(x-1)]     + 2*gray[y*w+(x+1)] +
        -1*gray[(y+1)*w+(x-1)] + 1*gray[(y+1)*w+(x+1)];
      // Sobel Y 커널
      const gy =
        -1*gray[(y-1)*w+(x-1)] - 2*gray[(y-1)*w+x] - 1*gray[(y-1)*w+(x+1)] +
         1*gray[(y+1)*w+(x-1)] + 2*gray[(y+1)*w+x] + 1*gray[(y+1)*w+(x+1)];
      Ix[i]=gx; Iy[i]=gy;
    }
  }
  return {Ix, Iy};
}

// 박스 블러 (구조텐서 성분 평균화용, separable)
function boxBlur(buf, w, h, radius){
  if(radius<=0) return new Float32Array(buf);
  const tmp = new Float32Array(w*h);
  const out = new Float32Array(w*h);
  const norm = 1/(radius*2+1);
  // 가로
  for(let y=0;y<h;y++){
    const row=y*w;
    let sum=0;
    for(let x=-radius;x<=radius;x++){ sum += buf[row + Math.min(w-1,Math.max(0,x))]; }
    for(let x=0;x<w;x++){
      tmp[row+x] = sum*norm;
      const xOut = x-radius, xIn = x+radius+1;
      sum += buf[row + Math.min(w-1,Math.max(0,xIn))] - buf[row + Math.min(w-1,Math.max(0,xOut))];
    }
  }
  // 세로
  for(let x=0;x<w;x++){
    let sum=0;
    for(let y=-radius;y<=radius;y++){ sum += tmp[Math.min(h-1,Math.max(0,y))*w+x]; }
    for(let y=0;y<h;y++){
      out[y*w+x] = sum*norm;
      const yOut=y-radius, yIn=y+radius+1;
      sum += tmp[Math.min(h-1,Math.max(0,yIn))*w+x] - tmp[Math.min(h-1,Math.max(0,yOut))*w+x];
    }
  }
  return out;
}

/**
 * computeHairOrientationField
 * 머리카락 마스크 영역에서 결방향 필드를 계산한다.
 * @param pixels  원본 이미지 RGBA Uint8ClampedArray (w*h*4)
 * @param maskBuf 머리카락 마스크 (0 또는 255, w*h)
 * @param w,h     이미지 크기
 * @returns {angle: Float32Array, coherence: Float32Array}
 *   angle[i]: 해당 픽셀에서 머리카락이 흐르는 방향 (라디안, -PI/2~PI/2 범위, 0=수직 아래방향 기준)
 *   coherence[i]: 0~1, 방향성이 얼마나 뚜렷한지 (1=결이 또렷, 0=무방향/노이즈)
 */
function computeHairOrientationField(pixels, maskBuf, w, h){
  const gray = toGrayscale(pixels, w, h);
  const {Ix, Iy} = sobelGradients(gray, w, h);

  // 구조텐서 성분: Jxx=Ix², Jyy=Iy², Jxy=IxIy
  const n = w*h;
  const Jxx = new Float32Array(n);
  const Jyy = new Float32Array(n);
  const Jxy = new Float32Array(n);
  for(let i=0;i<n;i++){
    Jxx[i] = Ix[i]*Ix[i];
    Jyy[i] = Iy[i]*Iy[i];
    Jxy[i] = Ix[i]*Iy[i];
  }

  // 박스블러로 국소 평균 (윈도우 반경 3 ≈ 머리카락 다발 굵기 정도)
  const blurR = 3;
  const JxxB = boxBlur(Jxx, w, h, blurR);
  const JyyB = boxBlur(Jyy, w, h, blurR);
  const JxyB = boxBlur(Jxy, w, h, blurR);

  const angle = new Float32Array(n);
  const coherence = new Float32Array(n);

  for(let i=0;i<n;i++){
    if(maskBuf[i]===0) continue; // 머리카락 영역만 계산
    const jxx=JxxB[i], jyy=JyyB[i], jxy=JxyB[i];

    // 구조텐서의 고유값으로 coherence 계산
    const trace = jxx+jyy;
    const diff  = jxx-jyy;
    const disc  = Math.sqrt(diff*diff + 4*jxy*jxy);
    const lambda1 = (trace+disc)/2; // 큰 고유값 (그래디언트가 가장 강한 방향)
    const lambda2 = (trace-disc)/2; // 작은 고유값 (결방향, 변화가 가장 적은 방향)

    coherence[i] = (lambda1+lambda2) > 1e-6 ? (lambda1-lambda2)/(lambda1+lambda2) : 0;

    // 그래디언트가 가장 강한 방향(고유벡터, 결에 수직)을 구한 뒤 90도 회전 → 결방향
    // 2*theta = atan2(2*Jxy, Jxx-Jyy)  (구조텐서 표준 공식)
    const gradDir = 0.5 * Math.atan2(2*jxy, diff);
    let hairDir = gradDir + Math.PI/2; // 결방향 = 그래디언트 방향 + 90도

    // -PI/2 ~ PI/2 범위로 정규화 (선분이라 180도 주기성을 가짐)
    while(hairDir > Math.PI/2)  hairDir -= Math.PI;
    while(hairDir < -Math.PI/2) hairDir += Math.PI;

    angle[i] = hairDir;
  }

  return {angle, coherence};
}

// 결방향 필드를 컬럼별 대표값으로 다운샘플 (가닥 렌더링에서 빠르게 참조하기 위함)
// 각 컬럼(x)에서 머리카락 마스크가 있는 y구간을 일정 간격으로 샘플링해 평균 방향 산출
function buildColumnOrientationSamples(angleField, coherenceField, maskBuf, w, h, samplesPerCol){
  // colSamples[x] = [{y, angle, coherence}, ...]  (y 오름차순)
  const colSamples = new Array(w);
  for(let x=0;x<w;x++){
    const samples=[];
    let ys=[];
    for(let y=0;y<h;y++){ if(maskBuf[y*w+x]>0) ys.push(y); }
    if(ys.length===0){ colSamples[x]=samples; continue; }
    const step = Math.max(1, Math.floor(ys.length/samplesPerCol));
    for(let k=0;k<ys.length;k+=step){
      const y=ys[k], i=y*w+x;
      samples.push({y, angle:angleField[i], coherence:coherenceField[i]});
    }
    colSamples[x]=samples;
  }
  return colSamples;
}

// 특정 (x,y) 근방의 결방향을 컬럼 샘플에서 보간해서 반환 (가닥 그릴 때 사용)
function sampleOrientation(colSamples, x, w, y){
  const col = colSamples[Math.max(0,Math.min(w-1,Math.round(x)))];
  if(!col || col.length===0) return {angle:0, coherence:0};
  // y에 가장 가까운 두 샘플을 찾아 선형보간
  let lo=null, hi=null;
  for(let s of col){
    if(s.y<=y) lo=s;
    if(s.y>=y && !hi) hi=s;
  }
  if(lo && hi && lo!==hi){
    const t=(y-lo.y)/(hi.y-lo.y || 1);
    // 결방향은 "선분"이라 180도 주기성을 가짐 (+89도와 -89도는 사실상 같은 결).
    // hi.angle을 그대로 선형보간하면 -PI/2/+PI/2 경계를 넘나들 때 값이
    // 엉뚱하게 0(수평)으로 꺾여서, 뷰와 무관하게 고정된 높이에 가로 빗살
    // 아티팩트가 생김. hi.angle을 lo.angle과 가장 가까운 표현으로 맞춘 뒤 보간한다.
    let hiAngle = hi.angle;
    let diff = hiAngle - lo.angle;
    while(diff > Math.PI/2)  { hiAngle -= Math.PI; diff = hiAngle - lo.angle; }
    while(diff < -Math.PI/2) { hiAngle += Math.PI; diff = hiAngle - lo.angle; }
    return {
      angle: lo.angle + diff*t,
      coherence: lo.coherence + (hi.coherence-lo.coherence)*t
    };
  }
  return lo || hi || {angle:0, coherence:0};
}

const STAGE_NAMES={capture:'1/4 · 촬영',style:'2/4 · 스타일',adjust:'3/4 · 조정',compare:'4/4 · 비교'};

async function navTo(name){
  // unlock tabs as user progresses
  const unlock = (id)=>{ const t=document.getElementById('nav-'+id); if(t) t.disabled=false; };

  if(name==='style'){
    unlock('style');
    if(!aiAnalysis){
      // segmenter가 아직 로딩 중이면 잠깐 대기 (최대 6초)
      if(!segmenterReady && !segmenterError){
        showAI('모델 로딩 중…', 'Hair Segmentation 준비 중');
        let waited = 0;
        while(!segmenterReady && !segmenterError && waited < 6000){
          await new Promise(r=>setTimeout(r,300)); waited+=300;
        }
      }
      if(segmenter){
        const validAngles = ANGLES.filter(a=>state.shots[a]);
        let done = 0;
        for(const a of validAngles){
          showAI(
            `머리카락 추출 중… ${done+1}/${validAngles.length}`,
            `${ANGLE_LABELS[a]} 처리 중`
          );
          // Face Landmarker: 랜드마크를 먼저 감지해야 extractHairMask에서
          // 얼굴 위치 기반으로 정확한 제거 영역을 잡을 수 있음 (정면/측면 모두 대응)
          if(faceLandmarkerReady){
            showAI(`얼굴 분석 중… ${done+1}/${validAngles.length}`, `${ANGLE_LABELS[a]} 랜드마크 감지`);
            await detectFaceLandmarks(a);
          }
          await extractHairMask(a);
          if(faceLandmarkerReady){
            refineSectionBoundaries(a);
          }
          done++;
        }
        hideAI();
        // 모든 뷰 랜드마크 추출 완료 → 매핑 테이블 생성
        buildViewMapping();
      }
      await analyzeWithClaude();
    }
  }
  if(name==='capture'){ stopVoice(); }

  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  const tab = document.getElementById('nav-'+name);
  if(tab) tab.classList.add('active');
  document.getElementById('stageLabel').innerHTML='단계 <b>'+STAGE_NAMES[name]+'</b>';
  currentScreen = name; // 먼저 업데이트

  // currentScreen 업데이트 후 렌더 (블랭크 수정)
  if(name==='adjust'){
    unlock('adjust'); renderAngleSwitch('angleSwitch');
    const angle = state.currentViewAngle;
    const el = document.getElementById('segStatus');
    if(el){
      if(state.hairMasks[angle] && state.hairMasks[angle].scalpY){
        const validCols = Array.from(state.hairMasks[angle].scalpY).filter(y=>y>=0).length;
        const lm = state.landmarks && state.landmarks[angle];
        const yawStr = lm ? ` | yaw:${lm.yaw.toFixed(2)}` : '';
        el.textContent = `✓ 머리카락 인식됨 (${validCols}px 폭) | ${state._diagLog||''}${yawStr}`;
      } else if(state.hairCanvases[angle]){
        el.textContent = `△ 색상 기반 추출 | ${state._diagLog||''}`;
      } else {
        el.textContent = `가이드 오버레이 모드 | 세그멘터:${state.segmenterType||'로딩중'}`;
      }
    }
    buildSectionTabs();
    // globalCurl 슬라이더 동기화
    const gcSlider = document.getElementById('slider-globalCurl');
    const gcVal = document.getElementById('val-globalCurl');
    if(gcSlider) gcSlider.value = state._globalCurl;
    if(gcVal) gcVal.textContent = state._globalCurl;
    setTimeout(()=>drawAdjustPreview(),80);
  }
  if(name==='compare'){ unlock('compare'); renderAngleSwitch('angleSwitchCompare'); setTimeout(()=>drawCompare(),80); }
}

function updateAngleUI(){

function jumpToAngle(i){ state.currentCaptureIndex=i; updateAngleUI(); }

function captureCurrentAngle(){
  const angle=ANGLES[state.currentCaptureIndex];
  if(state.shots[angle]){ retakeCurrent(); return; }
  if(video.style.display!=='none' && video.videoWidth){
    const c=document.createElement('canvas');
    c.width=video.videoWidth; c.height=video.videoHeight;
    const ctx=c.getContext('2d');
    ctx.translate(c.width,0); ctx.scale(-1,1); // mirror
    ctx.drawImage(video,0,0);
    state.shots[angle]=c.toDataURL('image/jpeg',0.85);
    // auto advance
    if(state.currentCaptureIndex<3) state.currentCaptureIndex++;
    updateAngleUI();
  } else { showToast('카메라가 준비되지 않았어요.'); }
}

function retakeCurrent(){
  const angle=ANGLES[state.currentCaptureIndex];
  state.shots[angle]=null; state.hairCanvases[angle]=null; state.hairMasks[angle]=null; state.baseCanvases[angle]=null;
  aiAnalysis=null;
  updateAngleUI();
}

function handleFileUpload(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    state.shots[ANGLES[state.currentCaptureIndex]]=ev.target.result;
    if(state.currentCaptureIndex<3) state.currentCaptureIndex++;
    updateAngleUI();
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function styleIconSVG(st){
  let s=''; const n=14;
  for(let i=0;i<n;i++){
    const t=i/(n-1), x=20+t*60;
    const amp=(st.curl/100)*14, len=16+(st.length/100)*50;
    const mx=x+Math.sin(t*6)*amp, ex=x+Math.sin(t*6+1)*amp*1.3;
    s+=`<path d="M ${x} 16 Q ${mx} ${16+len*0.5} ${ex} ${16+len}" stroke="${st.colorHex}" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>`;
  }
  return `<svg viewBox="0 0 100 90" width="100%" height="100%"><circle cx="50" cy="12" r="9" fill="#3A332B"/>${s}</svg>`;
}

function propagateSectionChange(secId, param){
  // crown 길이 → temple 길이에 50% 반영 (연결감 유지)
  if(secId==='crown' && param==='length'){
    const crownLen = state.sections.crown.length;
    const templeBlend = state.sections.temple.blend / 100;
    const newTemple = Math.round(crownLen * (1 - templeBlend*0.4));
    state.sections.temple.length = Math.max(0, Math.min(100, newTemple));
    const tSlider = document.getElementById('secslider-temple-length');
    if(tSlider) tSlider.value = state.sections.temple.length;
    const _tv = document.getElementById('secval-temple-length'); if(_tv) _tv.textContent = state.sections.temple.length;
    updateSectionSummary('temple');
  }
  // side 길이 변경 시 occipital에 30% 반영
  if(secId==='side' && param==='length'){
    const blend = 0.3;
    state.sections.occipital.length = Math.round(
      state.sections.occipital.length * (1-blend) + state.sections.side.length * blend
    );
    const oSlider = document.getElementById('secslider-occipital-length');
    if(oSlider) oSlider.value = state.sections.occipital.length;
    const _ov = document.getElementById('secval-occipital-length'); if(_ov) _ov.textContent = state.sections.occipital.length;
    updateSectionSummary('occipital');
  }
}

/* ════════════════════════════════════════
   RENDER / CANVAS
   - 이미지 캐시로 매번 new Image() 방지
   - hairCanvas 없으면 SVG 선 오버레이로 폴백
════════════════════════════════════════ */
const imgCache = {}; // angle → HTMLImageElement (loaded)

function getCachedImg(angle, cb){
  const url = state.shots[angle];
  if(!url){ cb(null); return; }
  if(imgCache[angle] && imgCache[angle].src.endsWith(url.slice(-20))){
    cb(imgCache[angle]); return;
  }
  const img = new Image();
  img.onload = ()=>{ imgCache[angle]=img; cb(img); };
  img.onerror = ()=>cb(null);
  img.src = url;
}

function drawImgOnCanvas(ctx, img, w, h){
  const {dw,dh,dx,dy} = computeFit(img.width, img.height, w, h);
  ctx.drawImage(img,dx,dy,dw,dh);
  return {dw,dh,dx,dy};
}

// fit 계산만 하고 실제로 그리지는 않음 (베이스를 원본 대신 baseC로 바로 그릴 때 사용)
function computeFit(imgW, imgH, w, h){
  const ir=imgW/imgH, cr=w/h;
  let dw,dh,dx,dy;
  if(ir>cr){dh=h;dw=h*ir;dx=(w-dw)/2;dy=0;}
  else{dw=w;dh=w/ir;dx=0;dy=(h-dh)/2;}
  return {dw,dh,dx,dy};
}

function syncCanvasSize(canvas){
  const rect=canvas.getBoundingClientRect();
  if(rect.width>0&&rect.height>0){canvas.width=rect.width;canvas.height=rect.height;}
}

// SVG 폴백: hairCanvas 없을 때 선으로 헤어 표현
function drawHairSVGFallback(ctx, w, h, fit){
  if(!state.selectedStyle) return;
  const {length,curl,volume,thickness} = state.sliders;
  const {dw,dh,dx,dy} = fit;

  // 머리 중심 추정 (사진 상단 1/3 중앙)
  const headCX = dx + dw/2;
  const headTopY = dy;
  const headR = dw * 0.18; // 얼굴 반경 추정

  const numStrands = Math.round(8 + (volume/100)*16);
  const hairLen = h * (0.12 + (length/100)*0.45);
  const curlAmt = (curl/100)*40;
  const alpha = 0.35 + (thickness/100)*0.45;
  const color = state.selectedStyle.colorHex;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.8;
  ctx.lineCap = 'round';

  for(let i=0;i<numStrands;i++){
    const t = i/(numStrands-1); // 0~1
    const angle_rad = (t - 0.5) * Math.PI * 1.1; // 머리 둘레
    const startX = headCX + Math.sin(angle_rad) * headR;
    const startY = headTopY + headR * 0.6 - Math.cos(angle_rad) * headR * 0.5;

    const sideOffset = (t-0.5)*2; // -1~1
    const endX = startX + sideOffset*curlAmt + Math.sin(t*Math.PI*3)*curlAmt*0.4;
    const endY = startY + hairLen;
    const cp1x = startX + sideOffset*curlAmt*0.3;
    const cp1y = startY + hairLen*0.4;
    const cp2x = endX + Math.sin(t*Math.PI*2)*curlAmt*0.5;
    const cp2y = startY + hairLen*0.75;

    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,endX,endY);
    ctx.stroke();
  }
  ctx.restore();
}

// 핵심 렌더 함수
function renderFrame(canvas, angle){
  syncCanvasSize(canvas);
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  if(w===0||h===0){ setTimeout(()=>renderFrame(canvas,angle),50); return; }

  getCachedImg(angle, (img)=>{
    ctx.clearRect(0,0,w,h);

    const hairC   = state.hairCanvases[angle];
    const baseC   = state.baseCanvases[angle];
    const maskInf = state.hairMasks[angle];

    if(hairC && baseC && maskInf && maskInf.scalpY){
      // ── 세그멘테이션 성공 ──
      // 레이어 순서:
      // [1] baseC (원본에서 머리카락 영역이 진짜로 지워진 베이스) → 얼굴·배경만
      // [2] 헤어컬러 언더코트 (마스크 실루엣을 평균 헤어컬러로 채움, 가닥 사이 빈틈 방지)
      // [3] 새 가닥 (scalpY 기반, 자유롭게 아래로 뻗음)
      // [4] 컬러 오버레이

      const fit = computeFit(img.width, img.height, w, h);

      // 이전 버그: 원본 img를 먼저 통째로 그린 뒤 baseC(머리 부분 투명)를
      // source-over로 덮었는데, 투명 픽셀은 source-over에서 아무 효과가 없어서
      // 원본 머리카락이 전혀 안 지워지고 그대로 남아있었음(가닥은 그 위에 얹히기만 함).
      // → baseC 자체를 베이스로 바로 그려서 머리카락 영역을 실제로 비운다.
      ctx.drawImage(baseC, fit.dx, fit.dy, fit.dw, fit.dh);

      // 헤어컬러 언더코트: hairC(원본 머리카락 픽셀, 마스크 실루엣 alpha)를
      // source-in으로 평균 헤어컬러 단색 채움 → 새 가닥이 성기게 그려진 틈새로
      // "원본 사진의 실제 머리카락"이 아니라 밋밋한 단색이 비치게 해서,
      // 새로 생성된 가닥의 실제 커버리지를 눈으로 정확히 판단할 수 있게 함
      const avgColor = maskInf.avgColor;
      const undercoat = document.createElement('canvas');
      undercoat.width = hairC.width; undercoat.height = hairC.height;
      const uCtx = undercoat.getContext('2d');
      uCtx.drawImage(hairC, 0, 0);
      uCtx.globalCompositeOperation = 'source-in';
      uCtx.fillStyle = avgColor;
      uCtx.fillRect(0, 0, undercoat.width, undercoat.height);
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.drawImage(undercoat, fit.dx, fit.dy, fit.dw, fit.dh);
      ctx.restore();

      const {length,curl,volume,thickness} = state.sliders[angle];
      const maskW = maskInf.w, maskH = maskInf.h;
      const scalpY   = maskInf.scalpY;
      const hairEndY = maskInf.hairEndY;

      const validCount = Array.from(scalpY).filter(y=>y>=0).length;

      if(validCount > maskW * 0.05){
        // 가닥 오버레이 — ctx(메인 캔버스)에 직접 그림, clip 없음
        drawHairStrands(ctx, fit, scalpY, hairEndY, maskW, maskH, hairC, {
          length, curl, volume, thickness,
          color: (state.selectedStyle ? state.selectedStyle.colorHex : null) || maskInf.avgColor,
          orientation: maskInf.orientation,       // 결방향 컬럼 샘플 (축소해상도 좌표)
          orientMaskW: maskInf.maskW,              // 결방향 필드가 계산된 축소 해상도 폭
          orientMaskH: maskInf.maskH,              // 결방향 필드가 계산된 축소 해상도 높이
        });

        // 컬러 오버레이
        if(state.selectedStyle){
          ctx.save();
          ctx.globalCompositeOperation='multiply';
          ctx.globalAlpha=0.15;
          ctx.fillStyle=state.selectedStyle.colorHex;
          const minScalpY = Math.min(...Array.from(scalpY).filter(y=>y>=0));
          const maxHairY  = Math.max(...Array.from(hairEndY).filter(y=>y>=0));
          const top    = fit.dy + (minScalpY/maskH)*fit.dh;
          const bottom = fit.dy + (maxHairY/maskH)*fit.dh * (0.6 + (length/100)*1.0);
          ctx.fillRect(fit.dx, top, fit.dw, bottom - top);
          ctx.restore();
        }
      }

    } else if(img){
      // ── 세그멘테이션 없음: 원본만 표시 (SVG 폴백 제거) ──
      drawImgOnCanvas(ctx, img, w, h);
    } else {
      ctx.fillStyle='#211D19'; ctx.fillRect(0,0,w,h);
      ctx.fillStyle='#52483D'; ctx.font='13px Inter'; ctx.textAlign='center';
      ctx.fillText('이 각도의 사진이 없습니다', w/2, h/2);
    }
  });
}

/* ────────────────────────────────────────
   가닥 렌더링
   - hairCanvas(마스크 영역)를 clip path로 사용 → 마스크 밖으로 절대 안 나감
   - 두피 라인(scalpY)에서 출발, 길이·컬·볼륨 슬라이더 반영
   - 미용 "섹션" 개념: 굵은 면 레이어 + 가는 가닥 레이어 혼합
──────────────────────────────────────── */
function drawHairStrands(ctx, fit, scalpY, hairEndY, maskW, maskH, hairCanvas, opts){
  const {length, curl, volume, thickness, color, orientation, orientMaskW, orientMaskH} = opts;

  const hairLenMult = 0.4 + (length/100) * 3.0;
  const curlAmt     = (curl/100) * fit.dw * 0.07;
  const alpha       = 0.45 + (thickness/100) * 0.40;

  // 길이 슬라이더가 높을 때(특히 정면 프론트) 가닥이 이마 라인을 넘어
  // 눈·안경·턱까지 뚫고 내려가는 과확장을 막기 위한 상한.
  // maskH(축소 해상도 이미지 전체 높이)의 1.15배까지만 허용 — 화면 밖까지
  // 늘어나는 극단적인 경우를 방지하면서도 "길게" 설정한 효과는 유지.
  const maxStrandLen = maskH * 1.15;

  const validCols = [];
  for(let x=0; x<maskW; x++){
    if(scalpY[x] >= 0) validCols.push(x);
  }
  if(validCols.length === 0) return;

  // ── 보간: validCols 안에서 hairEndY/scalpY -1인 열을 인접 유효값으로 채움 ──
  const iScalpY   = new Float32Array(maskW).fill(-1);
  const iHairEndY = new Float32Array(maskW).fill(-1);
  for(let x=0;x<maskW;x++){ iScalpY[x]=scalpY[x]; iHairEndY[x]=hairEndY[x]; }
  // forward pass
  let lS=-1, lE=-1;
  for(let x=0;x<maskW;x++){
    if(iScalpY[x]>=0)   lS=iScalpY[x];   else if(lS>=0) iScalpY[x]=lS;
    if(iHairEndY[x]>=0) lE=iHairEndY[x]; else if(lE>=0) iHairEndY[x]=lE;
  }
  // backward pass
  let fS=-1, fE=-1;
  for(let x=maskW-1;x>=0;x--){
    if(iScalpY[x]>=0)   fS=iScalpY[x];   else if(fS>=0) iScalpY[x]=fS;
    if(iHairEndY[x]>=0) fE=iHairEndY[x]; else if(fE>=0) iHairEndY[x]=fE;
  }

  // curl 방향 기준: 마스크 실제 수평 중심
  const maskCX = validCols.reduce((a,b)=>a+b,0) / validCols.length;

  const toCanvasX = (ix) => fit.dx + (ix / maskW) * fit.dw;
  const toCanvasY = (iy) => fit.dy + (iy / maskH) * fit.dh;

  // scalpY 좌표계(maskW,maskH) → orientation 필드 좌표계(orientMaskW,orientMaskH) 변환 비율
  const hasOrientation = !!(orientation && orientMaskW && orientMaskH);
  const ox = hasOrientation ? orientMaskW / maskW : 1;
  const oy = hasOrientation ? orientMaskH / maskH : 1;

  const cw = ctx.canvas.width, ch = ctx.canvas.height;

  const offscreen = document.createElement('canvas');
  offscreen.width = cw; offscreen.height = ch;
  const oCtx = offscreen.getContext('2d');
  oCtx.lineCap  = 'round';
  oCtx.lineJoin = 'round';

  /**
   * traceStrand: 시작점(ix,sy_img)에서 목표 길이(targetLen)만큼
   * 결방향 필드를 따라 작은 스텝으로 전진하며 경로를 추적한다.
   * 결방향 데이터가 없거나 coherence가 낮은 구간에서는 자연스러운
   * 약한 흔들림(curlAmt 기반)으로 보강하여 완전히 끊기지 않게 한다.
   * @returns canvas 좌표계 점 배열 [{x,y}, ...]
   */
  function traceStrand(ix, sy_img, targetLen_img, jitterSeed){
    const steps = 14; // 경로를 14개 세그먼트로 추적 (부드러움과 성능의 균형)
    const stepLen = targetLen_img / steps;
    const pts = [{x:ix, y:sy_img}]; // 마스크 좌표계(maskW,maskH 기준)로 누적
    // 직전 진행방향(라디안). 시작은 "아래쪽"(PI/2)에서 출발
    let prevDir = Math.PI/2;

    for(let s=0; s<steps; s++){
      const cur = pts[pts.length-1];
      let dir = prevDir;

      // 처음 2스텝은 orientation 필드 참조를 건너뜀.
      // 이유: 모든 가닥이 scalpY(두피 경계선) 바로 위에서 출발하는데,
      // 그 경계 픽셀 자체가 "머리카락↔배경" 급격한 명암차 경계라
      // Structure Tensor가 이 경계선 자체를 결로 착각해서 가로 방향을
      // 결방향으로 잘못 계산함. 그 결과 모든 가닥이 시작하자마자
      // 옆으로 꺾여서, 뷰 각도와 무관하게 두피 경계 높이에 가로
      // "빗살 띠"가 생기는 근본 원인이었음.
      // → 경계에서 살짝 벗어난 뒤(2스텝, 자연스러운 아래방향 진행)부터
      //   결방향을 신뢰하고 따라가도록 함.
      if(hasOrientation && s >= 2){
        const sample = sampleOrientation(orientation, cur.x*ox, orientMaskW, cur.y*oy);
        if(sample.coherence > 0.12){
          // sample.angle은 atan2 좌표계(0=+x축/가로, ±PI/2=+y축 방향/세로)로 계산된
          // "결의 방향" 그 자체이며, cos/sin을 취하면 바로 진행 단위벡터가 된다.
          // 단, 결방향은 선분이라 180도 모호성이 있음(angle과 angle+PI가 동일한 결)
          // → 고정된 "아래쪽" 기준이 아니라 prevDir과 더 가까운 쪽을 선택해야
          //   수평에 가까운 결(0도 경계)에서 지그재그 튐이 생기지 않음
          let targetDir = sample.angle;
          let deltaCheck = targetDir - prevDir;
          while(deltaCheck > Math.PI) deltaCheck -= Math.PI*2;
          while(deltaCheck < -Math.PI) deltaCheck += Math.PI*2;
          if(Math.abs(deltaCheck) > Math.PI/2){
            // 반대 표현(targetDir+PI)이 prevDir에 더 가까움 → 그쪽 채택
            targetDir += Math.PI;
          }
          // coherence가 높을수록 결방향을 강하게 따름, 낮으면 이전 방향 유지 비중↑
          const w = Math.min(1, sample.coherence * 1.3);
          // 각도를 보간 (최단 회전 방향으로)
          let delta = targetDir - prevDir;
          while(delta > Math.PI) delta -= Math.PI*2;
          while(delta < -Math.PI) delta += Math.PI*2;
          dir = prevDir + delta * w;
        }
      }

      // curl 슬라이더 + 자연스러운 미세 흔들림 추가 (완전 직선 방지)
      const sideDir = ix < maskCX ? -1 : 1;
      const wiggle = Math.sin((s+jitterSeed)*0.9) * 0.12 + (Math.random()-0.5)*0.10;
      dir += sideDir * (curl/100) * 0.35 * Math.sin((s/steps)*Math.PI) + wiggle;

      // 실제 전진: dir은 "이미지 평면에서의 각도"이며 y축 기준 아래가 양수
      const dx = Math.cos(dir) * stepLen;
      const dy = Math.sin(dir) * stepLen;
      pts.push({x: cur.x + dx, y: cur.y + dy});
      prevDir = dir;
    }

    return pts;
  }

  // 마스크 좌표(이미지 픽셀 기준) 점 배열 → 캔버스 좌표로 변환
  function toCanvasPts(pts){
    return pts.map(p => ({ x: toCanvasX(p.x), y: toCanvasY(p.y) }));
  }

  // 점 배열을 부드러운 곡선으로 그림 (quadratic 중간점 보간)
  function strokePolyline(cPts){
    if(cPts.length < 2) return;
    oCtx.beginPath();
    oCtx.moveTo(cPts[0].x, cPts[0].y);
    for(let i=1;i<cPts.length-1;i++){
      const mx = (cPts[i].x + cPts[i+1].x)/2;
      const my = (cPts[i].y + cPts[i+1].y)/2;
      oCtx.quadraticCurveTo(cPts[i].x, cPts[i].y, mx, my);
    }
    const last = cPts[cPts.length-1];
    oCtx.lineTo(last.x, last.y);
    oCtx.stroke();
  }

  // ── 레이어 1: 굵은 섹션 (40~80개) ──
  const numSections = Math.round(40 + (volume/100) * 20);
  oCtx.globalAlpha = alpha * 0.55;
  oCtx.lineWidth   = 3 + (volume/100) * 3;
  for(let i=0; i<numSections; i++){
    const ix = validCols[Math.floor((i/numSections)*validCols.length)];
    const sy_img = iScalpY[ix]; if(sy_img < 0) continue;
    const ey_img = iHairEndY[ix] >= 0 ? iHairEndY[ix] : sy_img + maskH*0.40;
    const origLen = Math.max(ey_img - sy_img, maskH*0.05);
    const scaledLen = Math.min(origLen * hairLenMult, maxStrandLen);
    const startX = ix + (Math.random()-0.5)*(maskW/numSections)*1.5;
    const pts = traceStrand(startX, sy_img, scaledLen, i);
    oCtx.strokeStyle = tintColor(color, 0.70+Math.random()*0.35);
    strokePolyline(toCanvasPts(pts));
  }

  // ── 레이어 2: 중간 가닥 (200~450개) ──
  const numMid = Math.round(200 + (volume/100) * 250);
  oCtx.globalAlpha = alpha * 0.55;
  oCtx.lineWidth   = 1.5 + (thickness/100) * 1.5;
  for(let i=0; i<numMid; i++){
    const ix = validCols[Math.floor(Math.random()*validCols.length)];
    const sy_img = iScalpY[ix]; if(sy_img < 0) continue;
    const ey_img = iHairEndY[ix] >= 0 ? iHairEndY[ix] : sy_img + maskH*0.38;
    const origLen = Math.max(ey_img - sy_img, maskH*0.05);
    const scaledLen = Math.min(origLen * hairLenMult * (0.85+Math.random()*0.3), maxStrandLen);
    const startX = ix + (Math.random()-0.5)*maskW*0.008;
    const pts = traceStrand(startX, sy_img, scaledLen, i*0.618);
    oCtx.strokeStyle = tintColor(color, 0.72+Math.random()*0.45);
    strokePolyline(toCanvasPts(pts));
  }

  // ── 레이어 3: 잔 가닥 (200~400개) ──
  const numFine = Math.round(200 + (volume/100) * 200);
  oCtx.globalAlpha = alpha * 0.35;
  oCtx.lineWidth   = 0.4 + (thickness/100) * 0.6;
  for(let i=0; i<numFine; i++){
    const ix = validCols[Math.floor(Math.random()*validCols.length)];
    const sy_img = iScalpY[ix]; if(sy_img < 0) continue;
    const ey_img = iHairEndY[ix] >= 0 ? iHairEndY[ix] : sy_img + maskH*0.35;
    const origLen = Math.max(ey_img - sy_img, maskH*0.05);
    const scaledLen = Math.min(origLen * hairLenMult * (0.7+Math.random()*0.5), maxStrandLen);
    const startX = ix + (Math.random()-0.5)*maskW*0.012;
    const startY = sy_img + (Math.random()-0.5)*maskH*0.01;
    const pts = traceStrand(startX, startY, scaledLen, i*0.382);
    oCtx.strokeStyle = tintColor(color, 0.65+Math.random()*0.55);
    strokePolyline(toCanvasPts(pts));
  }

  // ── hair 마스크 clip: 시작점은 scalpY로 이미 필터됨
  // destination-in 제거 → 가닥이 마스크 경계 밖(아래)으로 자유롭게 뻗을 수 있음
  // (길이 슬라이더가 마스크 clip에 막히지 않도록)
  ctx.save();
  ctx.globalAlpha = 1;
  ctx.drawImage(offscreen, 0, 0);
  ctx.restore();
}
function tintColor(hex, bright){
  // hex 또는 rgb() 문자열을 받아 밝기 조정
  let r=42,g=27,b=18;
  if(hex.startsWith('#')){
    const n=parseInt(hex.slice(1),16);
    r=(n>>16)&255; g=(n>>8)&255; b=n&255;
  } else {
    const m=hex.match(/\d+/g);
    if(m&&m.length>=3){r=+m[0];g=+m[1];b=+m[2];}
  }
  return `rgb(${Math.min(255,Math.round(r*bright))},${Math.min(255,Math.round(g*bright))},${Math.min(255,Math.round(b*bright))})`;
}

function drawAdjustPreview(){
  if(currentScreen!=='adjust') return;

  rafId = requestAnimationFrame(()=>{

function drawCompare(){
  if(currentScreen!=='compare') return;
  const angle = state.currentViewAngle;
  const pane  = document.getElementById('comparePane');
  const baseC = document.getElementById('compareBaseCanvas');
  const topC  = document.getElementById('compareTopCanvas');
  const clip  = document.getElementById('compareClip');

  const pw = pane.clientWidth, ph = pane.clientHeight;
  if(pw===0||ph===0){ setTimeout(()=>drawCompare(),80); return; }
  baseC.width=pw; baseC.height=ph;
  topC.width=pw;  topC.height=ph;
  topC.style.width=pw+'px'; topC.style.height=ph+'px';

  const div = document.getElementById('compareDivider');
  if(!div.style.left||div.style.left==='0px') div.style.left='50%';
  const pct = parseFloat(div.style.left)||50;
  clip.style.width = pct+'%';

  getCachedImg(angle,(img)=>{
    const ctx = baseC.getContext('2d');
    ctx.clearRect(0,0,pw,ph);
    if(img) drawImgOnCanvas(ctx,img,pw,ph);
  });

  renderFrame(topC, angle);
}

async function analyzeWithClaude(){
  const frontImg=state.shots['front']; if(!frontImg) return;
  showAI('AI가 얼굴을 분석하고 있어요…','얼굴형 · 머리색 · 스타일 추천');
  const base64=frontImg.split(',')[1];
  const mediaType=frontImg.startsWith('data:image/png')?'image/png':'image/jpeg';
  const prompt=`미용실 고객 정면 사진입니다. 아래 JSON만 응답하세요. 다른 텍스트 없이.
{
  "hairColor": "black|brown|blonde|red|grey|colored",
  "faceShape": "oval|round|square|heart|long",
  "currentLength": "short|medium|long",
  "recommendedStyles": ["id1","id2"],
  "advice": "한국어 2문장 이내 스타일 조언"
}
스타일 id 목록: bob, long-wave, pixie, layered, curly, sleek, shag, lob`;

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
        {type:'text',text:prompt}
      ]}]})
    });
    const data=await res.json();
    const raw=data.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    aiAnalysis=JSON.parse(raw);
    document.querySelectorAll('.style-card').forEach(c=>c.classList.remove('ai-recommended'));
    (aiAnalysis.recommendedStyles||[]).forEach(id=>{
      const el=document.getElementById('style-'+id); if(el) el.classList.add('ai-recommended');
    });
    const faceMap={oval:'계란형',round:'둥근형',square:'각진형',heart:'하트형',long:'긴형'};
    const colorMap={black:'블랙',brown:'브라운',blonde:'블론드',red:'레드',grey:'그레이',colored:'컬러'};
    const lenMap={short:'숏',medium:'미디엄',long:'롱'};
    document.getElementById('aiAnalysisText').textContent=aiAnalysis.advice||'';
    const tags=[faceMap[aiAnalysis.faceShape]||'',colorMap[aiAnalysis.hairColor]||'',lenMap[aiAnalysis.currentLength]||''];
    document.getElementById('aiAnalysisTags').innerHTML=tags.filter(Boolean).map(t=>`<span class="ai-tag">${t}</span>`).join('');
    document.getElementById('aiAnalysisCard').style.display='flex';
  }catch(e){
    showToast('AI 분석 실패. 수동으로 조정해주세요.');
  }
  hideAI();
}
